<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leading with AI · Presenter</title>
<style>
  :root{
    --bg:#13242a;--surface:#1d3335;
    --line:rgba(255,255,255,.16);--line-2:rgba(255,255,255,.30);
    --ink:#eef3f1;--muted:#9fb4ae;
    --accent:#9ec7bd;--accent-d:#7fb0a4;--amber:#e3b04b;--rust:#e0775c;
    --serif:Georgia,"Times New Roman",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--bg);
    min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}
  @media (prefers-reduced-motion: reduce){*{animation:none !important;transition:none !important;}}
  ::selection{background:var(--accent);color:#0b1a18;}

  .top{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;
    border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg);z-index:20;}
  .top .brand{font-size:15px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;font-family:var(--serif);}
  .top .brand b{color:var(--accent);font-weight:800;}
  .meters{display:flex;align-items:center;gap:22px;}
  .meter{display:flex;align-items:center;gap:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-size:12px;}
  .meter b{color:var(--ink);font-size:15px;font-variant-numeric:tabular-nums;}
  .submeter{padding:6px 14px;border:1px solid var(--line);border-radius:99px;text-transform:uppercase;letter-spacing:.08em;font-size:12px;color:var(--muted);}
  .submeter b{font-variant-numeric:tabular-nums;}
  .submeter.full{background:var(--accent);color:#0b1a18;border-color:var(--accent);font-weight:700;}
  .submeter.full b{color:#0b1a18;}
  .dot{width:9px;height:9px;border-radius:50%;background:#4a5a58;}
  .dot.on{background:var(--accent);}
  .dot.off{background:var(--rust);}
  .roomcode{font-size:14px;color:var(--accent);font-variant-numeric:tabular-nums;letter-spacing:.04em;}
  .netbanner{background:var(--amber);color:#1a1206;font-weight:600;font-size:14px;
    padding:11px 32px;text-align:center;letter-spacing:.01em;}

  .stage{flex:1;max-width:1100px;width:100%;margin:0 auto;padding:48px 40px;}
  h1{font-family:var(--serif);font-size:clamp(40px,6vw,70px);margin:0 0 14px;line-height:1.02;font-weight:700;letter-spacing:-.02em;}
  .eyebrow{text-transform:uppercase;font-size:12px;font-weight:700;letter-spacing:.26em;color:var(--muted);}
  .sub{color:var(--muted);font-size:20px;margin:14px 0 30px;font-weight:400;max-width:720px;line-height:1.45;}

  /* join */
  .join{background:transparent;border:1px solid var(--line);border-radius:18px;padding:54px;text-align:center;}
  .join>div:first-child{color:var(--muted);text-transform:uppercase;letter-spacing:.2em;font-size:12px;}
  .join .code{font-family:var(--serif);font-size:clamp(56px,10vw,104px);color:var(--accent);letter-spacing:.04em;font-weight:800;font-variant-numeric:tabular-nums;line-height:1;}
  .join .url{font-size:22px;margin-top:10px;color:var(--ink);font-weight:300;}
  .join .url b{font-weight:700;}
  .join .hint{color:var(--muted);font-size:15px;margin-top:18px;}

  /* quiz */
  .qcard{background:transparent;border:none;padding:0;}
  .qhead{display:flex;align-items:center;gap:16px;}
  .qtag{font-size:13px;letter-spacing:.2em;text-transform:uppercase;font-weight:700;color:var(--accent);}
  .claim{font-family:var(--serif);font-size:clamp(26px,3.6vw,44px);line-height:1.1;margin:14px 0 30px;font-weight:700;letter-spacing:-.01em;max-width:900px;}
  .qopts{display:grid;gap:12px;}
  .qopt{display:flex;align-items:center;gap:18px;border:1px solid var(--line);border-radius:14px;padding:20px 24px;font-size:clamp(17px,2.1vw,23px);background:transparent;transition:border-color .2s;}
  .qopt .mk{font-weight:800;color:var(--muted);width:24px;}
  .qopt .bar{margin-left:auto;height:10px;border-radius:6px;background:var(--accent);width:0;transition:width .5s;}
  .qopt .pct{font-size:16px;color:var(--muted);min-width:48px;text-align:right;font-variant-numeric:tabular-nums;}
  .qopt.correct{border-color:var(--accent);background:rgba(158,199,189,.10);}
  .qopt.correct .mk{color:var(--accent);}
  .why{margin-top:24px;border-left:3px solid var(--accent);padding:6px 0 6px 22px;font-size:20px;display:none;color:var(--muted);max-width:820px;line-height:1.5;}
  .why.show{display:block;}
  .why b{color:var(--ink);font-weight:700;}

  /* readiness */
  .confgrid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:18px;overflow:hidden;}
  .confbox{background:var(--bg);padding:48px 30px;text-align:center;}
  .confbox .num{font-family:var(--serif);font-size:clamp(72px,13vw,150px);line-height:1;color:var(--accent);font-weight:800;font-variant-numeric:tabular-nums;}
  .confbox .lbl{font-size:13px;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;}
  .confbox .n{font-size:13px;color:var(--muted);margin-top:12px;font-variant-numeric:tabular-nums;}
  .movehint{text-align:center;font-size:24px;margin-top:34px;color:var(--ink);font-weight:600;letter-spacing:-.01em;}

  /* reflect */
  .beat{background:transparent;border:1px solid var(--line);border-radius:16px;padding:24px 28px;margin-bottom:14px;}
  .beat .w{font-size:12px;letter-spacing:.2em;text-transform:uppercase;font-weight:700;color:var(--accent);}
  .beat .qx{font-family:var(--serif);font-size:clamp(21px,2.6vw,29px);margin-top:8px;font-weight:700;letter-spacing:-.01em;line-height:1.22;}

  /* wall */
  .wallctl{display:flex;gap:10px;margin:8px 0 22px;flex-wrap:wrap;}
  .wallctl input{flex:1;min-width:280px;font-size:17px;padding:15px 18px;border-radius:12px;border:1px solid var(--line);background:var(--surface);color:#fff;font-family:var(--sans);}
  .wallctl input:focus{outline:none;border-color:var(--accent);}
  .wallctl select{font-size:15px;padding:0 14px;border-radius:12px;border:1px solid var(--line);background:var(--surface);color:#fff;font-family:var(--sans);}
  .wall{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;}
  .tile{border:1px solid var(--line);border-radius:14px;padding:18px 20px;color:#16282a;animation:pop .3s ease;}
  @keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:none}}
  .tile .cat{font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:800;color:#25655c;}
  .tile .txt{font-size:18px;margin-top:6px;line-height:1.3;font-weight:500;}
  .wallcount{font-size:14px;color:var(--muted);margin-top:18px;text-transform:uppercase;letter-spacing:.08em;}

  /* relay */
  .wsw-band{display:flex;gap:28px;margin:16px 0 0;flex-wrap:wrap;}
  .wsw-band span{font-size:12px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;color:var(--muted);}
  .lead{display:flex;flex-direction:column;gap:10px;margin-top:22px;}
  .team{display:flex;align-items:center;gap:18px;background:transparent;border:1px solid var(--line);border-radius:14px;padding:16px 22px;}
  .team .rank{font-family:var(--serif);font-size:28px;color:var(--accent);width:42px;font-weight:800;font-variant-numeric:tabular-nums;}
  .team .nm{font-size:22px;font-weight:600;flex:1;}
  .team .sc{font-family:var(--serif);font-size:34px;color:var(--accent);min-width:56px;text-align:right;font-weight:800;font-variant-numeric:tabular-nums;}
  .team .pm button{width:40px;height:40px;border-radius:10px;border:1px solid var(--line);background:transparent;color:#fff;font-size:20px;cursor:pointer;}
  .team .pm button:hover{border-color:var(--accent);}
  .addteam{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;}
  .addteam input{flex:1;min-width:200px;font-size:16px;padding:13px 16px;border-radius:10px;border:1px solid var(--line);background:var(--surface);color:#fff;font-family:var(--sans);}
  .roles{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:8px;}
  @media(max-width:820px){.roles{grid-template-columns:1fr;}}
  .role{border:1px solid var(--line);border-top:3px solid var(--accent);border-radius:12px;padding:16px;}
  .role.opt{border-top-color:var(--amber);}
  .role .rl{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);font-weight:700;}
  .role.opt .rl{color:var(--amber);}
  .role .rn{font-family:var(--serif);font-weight:700;font-size:20px;margin:3px 0 8px;}
  .role p{font-size:14.5px;color:var(--muted);margin:0;line-height:1.45;}

  /* content slides */
  .closegrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:14px;}
  @media(max-width:820px){.closegrid{grid-template-columns:1fr;}}
  .cc{background:transparent;border:1px solid var(--line);border-radius:16px;padding:26px;}
  .cc .n{font-family:var(--serif);font-size:30px;color:var(--accent);font-weight:800;}
  .cc h3{margin:10px 0 8px;font-size:21px;font-weight:700;letter-spacing:-.01em;}
  .cc p{color:var(--muted);font-size:15px;margin:0;line-height:1.5;}
  .body-txt{font-size:clamp(19px,2.4vw,27px);color:var(--ink);font-weight:300;max-width:900px;line-height:1.42;margin:0 0 20px;}
  .body-txt b{font-weight:700;color:var(--accent);}
  .quote{font-family:var(--serif);font-size:clamp(26px,3.6vw,42px);font-weight:400;line-height:1.22;max-width:1000px;margin:6px 0 16px;letter-spacing:-.01em;font-style:italic;}
  .quote b{color:var(--accent);font-style:normal;font-weight:700;}
  .src{color:var(--muted);font-size:13px;text-transform:uppercase;letter-spacing:.14em;}
  .chips{display:flex;flex-wrap:wrap;gap:12px;margin-top:8px;}
  .chip{border:1px solid var(--line);border-radius:99px;padding:12px 22px;font-size:clamp(16px,1.9vw,21px);font-weight:400;}
  .chip b{color:var(--accent);font-weight:700;}
  .pilotrow{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:10px;}
  @media(max-width:820px){.pilotrow{grid-template-columns:1fr 1fr;}}
  .pilotrow .p{border:1px solid var(--line);border-radius:12px;padding:16px 14px;}
  .pilotrow .p b{font-family:var(--serif);display:block;font-size:clamp(18px,2vw,24px);color:#fff;margin-bottom:3px;}
  .pilotrow .p span{font-size:13px;color:var(--muted);}
  .polar{display:flex;flex-direction:column;gap:12px;margin-top:8px;max-width:820px;}
  .polar .row{display:flex;align-items:center;gap:16px;font-size:clamp(20px,2.6vw,28px);font-weight:600;border:1px solid var(--line);border-radius:14px;padding:16px 24px;}
  .polar .amp{color:var(--accent);font-weight:800;font-style:italic;}
  .stack{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
  .layer{border:1px solid var(--line);border-radius:11px;padding:14px 18px;display:flex;gap:16px;align-items:baseline;}
  .layer.you{border-color:var(--accent);background:rgba(158,199,189,.07);}
  .layer .ln{font-family:var(--serif);font-weight:700;font-size:18px;min-width:130px;color:#fff;}
  .layer .lg{font-size:15px;color:var(--muted);}
  .matrix{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:8px;}
  @media(max-width:820px){.matrix{grid-template-columns:1fr;}}
  .mcard{border:1px solid var(--line);border-radius:14px;padding:20px;}
  .mcard.secure{border-color:var(--accent);}
  .mcard h3{margin:0 0 4px;font-size:21px;}
  .mcard .ssub{font-size:13px;color:var(--muted);margin-bottom:12px;}
  .uselist{list-style:none;margin:0;padding:0;font-size:15.5px;}
  .uselist li{display:flex;gap:10px;align-items:flex-start;padding:6px 0;color:var(--ink);}
  .uselist .mk{flex:none;width:20px;height:20px;border-radius:50%;display:grid;place-items:center;font-size:12px;font-weight:700;color:#0b1a18;margin-top:2px;}
  .mk.yes{background:var(--accent);}
  .mk.no{background:var(--rust);}
  .gridc{display:grid;gap:12px;margin-top:14px;}
  .gridc.g5{grid-template-columns:repeat(5,1fr);}
  .gridc.g4{grid-template-columns:repeat(4,1fr);}
  @media(max-width:820px){.gridc.g5,.gridc.g4{grid-template-columns:1fr 1fr;}}
  .gridc .c{border:1px solid var(--line);border-radius:12px;padding:16px 12px;text-align:center;}
  .gridc .c b{display:block;font-family:var(--serif);font-size:clamp(15px,1.7vw,19px);margin-bottom:4px;color:#fff;}
  .gridc .c span{font-size:13px;color:var(--muted);}
  .ladder{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
  .rung{border:1px solid var(--line);border-radius:12px;padding:15px 18px;display:flex;align-items:center;gap:16px;}
  .rung.keep{border-color:var(--accent);background:rgba(158,199,189,.07);}
  .rung .lvl{font-family:var(--serif);font-weight:700;font-size:18px;min-width:120px;color:#fff;}
  .rung .role2{font-size:15px;color:var(--muted);flex:1;}
  .rung .fx{font-size:12.5px;font-weight:700;border-radius:20px;padding:4px 12px;white-space:nowrap;}
  .fx.takes{background:rgba(224,119,92,.18);color:var(--rust);}
  .fx.frees{background:rgba(158,199,189,.16);color:var(--accent);}
  .fx.aids{background:rgba(227,176,75,.16);color:var(--amber);}
  .feed{margin-top:24px;}
  .feedtitle{font-size:12px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;color:var(--accent);margin-bottom:10px;}
  .feeditem{font-size:clamp(16px,1.9vw,20px);line-height:1.35;padding:12px 0;border-top:1px solid var(--line);color:var(--ink);}
  .feeditem:first-of-type{border-top:none;}
  .ftag{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-right:10px;}

  .btn{font-family:var(--sans);font-size:14px;font-weight:700;border:none;border-radius:99px;padding:13px 26px;cursor:pointer;background:var(--accent);color:#0b1a18;text-transform:uppercase;letter-spacing:.04em;transition:opacity .2s;}
  .btn:hover{opacity:.88;}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line-2);}
  .btn.ghost:hover{border-color:var(--accent);opacity:1;}
  .btn.sm{padding:10px 16px;font-size:12px;}
  .btn:disabled{opacity:.3;cursor:default;}

  .deck{position:sticky;bottom:0;display:flex;align-items:center;justify-content:space-between;gap:14px;
    padding:16px 32px;border-top:1px solid var(--line);background:var(--bg);}
  .deck .label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;}
  .deck .label b{color:var(--ink);font-size:14px;font-variant-numeric:tabular-nums;}
  .deck .right{display:flex;gap:10px;align-items:center;}
  .rail{display:flex;gap:6px;flex-wrap:wrap;max-width:46vw;}
  .rail .s{width:20px;height:4px;border-radius:99px;background:var(--line-2);}
  .rail .s.done{background:var(--accent-d);opacity:.5;}
  .rail .s.now{background:var(--accent);}

  /* frame questions */
  .frameq{font-family:var(--serif);font-size:clamp(22px,3.4vw,38px);line-height:1.18;margin:16px 0;font-weight:700;letter-spacing:-.01em;color:var(--ink);}
  .frameq b{color:var(--accent);}
  /* welcome QR placeholder */
  .joinrow{display:flex;gap:34px;align-items:center;justify-content:center;flex-wrap:wrap;margin-top:16px;}
  .qrslot{width:170px;height:170px;flex:none;border:2px dashed var(--line-2);border-radius:16px;display:grid;place-items:center;
    color:var(--muted);font-size:12px;letter-spacing:.12em;text-transform:uppercase;text-align:center;line-height:1.6;}
  .joinmeta{text-align:left;}
  /* HEART highlight */
  .polar .row.lit{border-color:var(--accent);background:rgba(158,199,189,.09);}
  /* flip tiles */
  .flipgrid{display:grid;gap:14px;margin-top:18px;}
  .flipgrid.g2{grid-template-columns:1fr 1fr;}
  .flipgrid.gauto{grid-template-columns:repeat(auto-fit,minmax(190px,1fr));}
  @media(max-width:820px){.flipgrid.g2,.flipgrid.gauto{grid-template-columns:1fr;}}
  .flipcol{display:flex;flex-direction:column;gap:12px;margin-top:18px;}
  .fliptile{position:relative;cursor:pointer;}
  .fliptile .inner{position:relative;transition:transform .55s;transform-style:preserve-3d;}
  .flipgrid .fliptile .inner{min-height:158px;}
  .flipcol .fliptile .inner{min-height:92px;}
  .fliptile.flipped .inner{transform:rotateY(180deg);}
  .fliptile .face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    border:1px solid var(--line);border-radius:16px;padding:18px 22px;display:flex;flex-direction:column;justify-content:center;}
  .fliptile .back{transform:rotateY(180deg);background:rgba(158,199,189,.08);border-color:var(--accent);}
  .fliptile .fw{font-family:var(--serif);font-weight:800;font-size:clamp(20px,2.5vw,28px);color:#fff;letter-spacing:-.01em;}
  .fliptile .fs{font-size:14px;color:var(--muted);margin-top:4px;}
  .fliptile .fi{font-size:28px;margin-bottom:8px;line-height:1;}
  .fliptile .fl{font-size:14.5px;color:var(--ink);line-height:1.4;margin:3px 0;}
  .fliphint{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.14em;margin-top:14px;}
  @media (prefers-reduced-motion: reduce){.fliptile .inner{transition:none;}}
</style>
</head>
<body>

<div class="top">
  <div class="brand"><b>Leading</b> with AI · Presenter</div>
  <div class="meters">
    <span class="roomcode" id="rc"></span>
    <span class="meter"><span class="dot off" id="dot"></span><span id="lbl">set room</span></span>
    <span class="meter">👥 <b id="nconn">0</b>&nbsp;connected</span>
    <span class="submeter" id="submeter" style="display:none;"><b id="subcount">0 / 0</b>&nbsp;submitted</span>
  </div>
</div>

<div class="netbanner" id="netbanner" style="display:none;"></div>

<div class="stage" id="stage"></div>

<div class="deck">
  <div style="display:flex;gap:10px;align-items:center;">
    <button class="btn ghost sm" id="reset">⟳ New session</button>
    <button class="btn ghost" id="prev">◀ Back</button>
  </div>
  <div class="label">Slide <b id="stagei">1</b> · <span id="stagelbl"></span></div>
  <div class="rail" id="rail"></div>
  <div class="right">
    <button class="btn ghost" id="reveal" style="display:none;">Reveal answer</button>
    <button class="btn" id="next">Next ▶</button>
  </div>
</div>

<script>
/* ===== CONFIG · must match Audience_SL.html exactly ===== */
/* Day of the session, point both files at your own broker. For sync that works
   on any network (mobile data, locked down venue wifi), use a host that serves
   WSS on port 443; non standard ports like 8884 are often blocked. If the broker
   needs a login, set MQTT_USER and MQTT_PASS. These four lines must match
   Audience_SL.html byte for byte. */
const MQTT_URL  = "wss://broker.hivemq.com:8884/mqtt";  // TODO: swap for your own 443 endpoint
const TOPIC_NS  = "leadai-bty";                          // unique token; harder to guess than "leadai"
const MQTT_USER = "";                                    // broker username, if required
const MQTT_PASS = "";                                    // broker password, if required
/* ======================================================= */

const me = Math.random().toString(36).slice(2,9);
let ROOM = (new URLSearchParams(location.search).get("room")||"").toUpperCase();

/* ---------- leader-level scenario reads ---------- */
const QUIZ = [
  {tag:"What makes it new",
   claim:"An agent differs from a chatbot because it…",
   options:["It uses a bigger model and more training data","Runs a loop: plans, acts, checks its own work, repeats","It remembers everything you have ever told it","It is always connected to the live internet"],
   answer:1,
   why:"<b>It runs a loop.</b> A tool answers once. An agent sets a goal, acts, checks against it, and goes round again until done. You govern a process that keeps running when you are not watching, not a single answer."},
  {tag:"Your call",
   claim:"A VP wants to paste the whole cohort's exam records into free Claude to surface weak topics. You…",
   options:["Approve once the names are stripped out","Approve if the chat is deleted afterwards","Decline; the records stay on the government platform","Approve as a small one-subject pilot"],
   answer:2,
   why:"<b>Decline.</b> We govern by deciding what data goes where, not which tool is cleverer. Student and staff records stay on Pair and AIBots. Free Claude is for open work only."},
  {tag:"Spot the risk",
   claim:"You ask one strong HOD to build the school's 'house voice' skill for all staff comms. The main risk is…",
   options:["The skill will quickly fall out of date","One person's voice and blind spots pass as the whole school's","Staff will not trust a tool they did not build","It may quietly leak sensitive data to the vendor"],
   answer:1,
   why:"<b>A skill reflects whoever made it.</b> One voice can pass as the whole school's, and what we never write down is never captured. Build it with many, and govern the blind spots."},
  {tag:"What stays yours",
   claim:"Across Sergiovanni's five forces, which must a leader never delegate to AI?",

/* ---------- sync (MQTT over WebSocket) ---------- */
let client=null, wsOpen=false;
/* Persist the session id so an accidental presenter reload resumes the same run
   (leaders keep following, aggregates rebuild from their re-sends) rather than
   orphaning every connected screen. "New session" still mints a fresh id. */
let SID=(function(){ try{ var k=localStorage.getItem("sl_sid"); if(k) return k; }catch(e){}
  var v="s"+Math.random().toString(36).slice(2,8); try{localStorage.setItem("sl_sid",v);}catch(e){} return v; })();
function loadMqtt(){
  if(window.mqtt || document.getElementById("mqttlib")) return;
  var s=document.createElement("script"); s.id="mqttlib";
  s.src="https://cdn.jsdelivr.net/npm/mqtt@5.10.1/dist/mqtt.min.js";
  s.onerror=function(){ cdnBlocked=true; setConn(false); };
  document.head.appendChild(s);
}
function whenMqttReady(cb,tries){ tries=tries||0;
  if(typeof mqtt!=="undefined"){ cb(); }
  else if(tries<60){ setTimeout(function(){whenMqttReady(cb,tries+1);},200); }
  else { cdnBlocked=true; setConn(false); }
}
function topic(){ return TOPIC_NS+"/"+ROOM+"/bus"; }
function connect(){
  if(!ROOM){ ROOM="BTY-SL"; }
  document.getElementById("rc").textContent="Room "+ROOM;
  const opts={clientId:"pres_"+me, clean:true, reconnectPeriod:2500, connectTimeout:8000, keepalive:30};
  if(MQTT_USER){ opts.username=MQTT_USER; opts.password=MQTT_PASS; }
  client = mqtt.connect(MQTT_URL, opts);
  client.on("connect", ()=>{ wsOpen=true; setConn(true); client.subscribe(topic()); broadcastStage(); send({type:"reqmine"}); });
  client.on("reconnect", ()=>setConn(false));
  client.on("offline", ()=>{ wsOpen=false; setConn(false); });
  client.on("close", ()=>{ wsOpen=false; setConn(false); });
  client.on("error", ()=>setConn(false));
  client.on("message", (t,payload)=>onMsg(payload.toString()));
}
function send(o){ o.from=me; o.room=ROOM; o.sid=SID; if(client && wsOpen){ try{client.publish(topic(), JSON.stringify(o));}catch(e){} } }
function seen(id){ if(id) roster.set(id, Date.now()); }
function onMsg(raw){
  let d; try{ d=JSON.parse(raw);}catch(e){ return; }
  if(!d || d.from===me) return;
  if(d.type==="join" || d.type==="req"){ seen(d.from); broadcastStage(); updateMeters(); return; }
  if(d.sid!==SID) return;
  seen(d.from);
  if(d.type==="confidence"){
    (d.phase==="in"?confIn:confOut)[d.from]=d.value;
    submissions[d.phase==="in"?"in":"out"].add(d.from);
    if(curId()==="in"||curId()==="out") renderStage();
  } else if(d.type==="quiz"){
    qVotes[d.q][d.from]=d.answer; submissions["q"+d.q]&&submissions["q"+d.q].add(d.from);
    if(stageHasQ(d.q)) renderStage();
  } else if(d.type==="rule"){
    rules.push({cat:d.category||"",text:d.text}); submissions["charter"].add(d.from);
    if(curId()==="wall") renderWallTiles();
  } else if(d.type==="submitted"){
    if(submissions[d.step]) submissions[d.step].add(d.from);
  } else if(d.type==="share"){
    const slot=shared[d.channel];
    if(slot){ const k=d.from+"/"+d.key;
      if(d.on && d.text) slot[k]={key:d.key,text:d.text}; else delete slot[k];
      const id=curId();
      if((d.channel==="question"&&id==="in")||(d.channel==="reflect"&&id==="reflect")) renderStage();
      else if(d.channel==="charter"&&id==="wall") renderWallTiles();
    }
  }
  updateMeters();
}
function feedHTML(channel,title,labels){
  const items=Object.values(shared[channel]||{});
  if(!items.length) return "";
  return `<div class="feed"><div class="feedtitle">${title} · ${items.length}</div>`+
    items.map(it=>`<div class="feeditem">${labels&&labels[it.key]?`<span class="ftag">${labels[it.key]}</span>`:""}${esc(it.text)}</div>`).join("")+`</div>`;
}
let cdnBlocked=false, lastOnline=0, startTime=Date.now();
function setConn(on){ document.getElementById("dot").className="dot "+(on?"on":"off");
  document.getElementById("lbl").textContent=on?"live":"reconnecting";
  if(on) lastOnline=Date.now();
  updateNetBanner(); }
function updateNetBanner(){
  const dot=document.getElementById("dot"); if(!dot) return;
  const off=dot.classList.contains("off");
  const b=document.getElementById("netbanner"); if(!b) return;
  const ref=lastOnline||startTime;
  if(off && Date.now()-ref>15000){
    b.textContent = cdnBlocked
      ? "Sync library blocked on this network. Leaders can still follow the main screen; use the printed card."
      : "Live sync is not connecting here. Leaders can still follow the main screen; use the printed card.";
    b.style.display="";
  } else { b.style.display="none"; }
}

setInterval(()=>{
  const now=Date.now();
  for(const [id,t] of roster){ if(now-t>11000) roster.delete(id); }
  updateMeters();
  if(wsOpen) broadcastStage();   // safety beacon: a desynced or join-lost leader converges within a few seconds
  updateNetBanner();
},3000);

function activeN(){ return roster.size; }
function updateMeters(){
  document.getElementById("nconn").textContent=activeN();

    const got=submissions[s.sub].size, n=activeN();

    m.classList.toggle("full", n>0 && got>=n);

function curId(){ return STAGES[si].id; }
function stageHasQ(q){ const s=STAGES[si]; return s.aud==="quiz" && s.q===q; }
function broadcastStage(){ const s=STAGES[si]; let title="",eyebrow="";
  if(s.aud==="watch"){ const c=(typeof CONTENT!=="undefined"&&CONTENT[s.id])||{}; title=c.t||""; eyebrow=c.e||""; }
  send({type:"stage", id:s.aud, key:s.id, q:(s.q!=null?s.q:null), rev:(s.aud==="quiz"?!!revealed[s.q]:false), title:title, eyebrow:eyebrow}); }
function move(d){ si=Math.max(0,Math.min(STAGES.length-1, si+d)); broadcastStage(); renderStage(); }
document.getElementById("next").onclick=()=>move(1);
document.getElementById("prev").onclick=()=>move(-1);
document.getElementById("reveal").onclick=()=>{ const s=STAGES[si];
  if(s.aud==="quiz"){ revealed[s.q]=true; send({type:"reveal",q:s.q}); renderStage(); } };
document.getElementById("reset").onclick=resetSession;
function resetSession(){
  if(!confirm("Start a new session? This clears all responses and resets every connected screen.")) return;
  SID="s"+Math.random().toString(36).slice(2,8);
  try{localStorage.setItem("sl_sid",SID);}catch(e){}
  roster.clear();
  for(const k in submissions) submissions[k]=new Set();
  for(let i=0;i<qVotes.length;i++) qVotes[i]={};
  for(const k in revealed) delete revealed[k];
  for(const k in confIn) delete confIn[k];
  for(const k in confOut) delete confOut[k];
  for(const ch in shared) shared[ch]={};
  rules.length=0;
  teams.length=0; defaultTeams().forEach(function(n){teams.push({name:n,score:0});});
  si=0;
  send({type:"reset"}); broadcastStage();
  renderStage(); updateMeters();
}
function defaultTeams(){ return ["Trio 1","Trio 2","Trio 3","Trio 4","Trio 5","Trio 6"]; }

function renderRail(){ const r=document.getElementById("rail"); r.innerHTML="";
  STAGES.forEach((_,i)=>{ const d=document.createElement("div");
    d.className="s"+(i<si?" done":i===si?" now":""); r.appendChild(d); }); }

function renderStage(){
  const s=STAGES[si], host=document.getElementById("stage");
  document.getElementById("stagei").textContent=si+1;
  document.getElementById("stagelbl").textContent=s.label;
  document.getElementById("prev").disabled = si===0;
  document.getElementById("next").disabled = si===STAGES.length-1;
  document.getElementById("reveal").style.display = (s.aud==="quiz" && !revealed[s.q]) ? "" : "none";
  renderRail(); updateMeters();

  if(s.id==="welcome") host.innerHTML=stageWelcome();
  else if(s.aud==="quiz") host.innerHTML=stageQuiz(s.q);
  else if(s.id==="in") host.innerHTML=stageConf("in");
  else if(s.id==="out") host.innerHTML=stageConf("out");
  else if(s.id==="reflect") host.innerHTML=stageReflect();
  else if(s.id==="wall"){ host.innerHTML=stageWall(); wireWall(); }
  else if(s.id==="relay"){ host.innerHTML=stageRelay(); wireRelay(); }
  else host.innerHTML=renderContent(s.id);
}

function stageQuiz(q){
  const Q=QUIZ[q], votes=qVotes[q], total=Object.keys(votes).length, rev=!!revealed[q];

    h:`<p class="body-txt" style="font-size:clamp(16px,2vw,21px)">All the more, we need clarity of thought and metacognition: what is most needed, and what we want for our people.</p>
      <div class="flipcol">
        ${flipTile("Plan","set the course","🧭",["Name the goal and the guardrails before you start."])}
        ${flipTile("Instruct","load your skills","📋",["Give it your context, your voice, your rules."])}
        ${flipTile("Launch","let the loop run","🚀",["Hand it the task; let it plan, act, and check."])}
        ${flipTile("Oversee","stay in command","👁️",["You judge the result, and you answer for it."])}
        ${flipTile("Tune","add capability","🎚️",["Add a skill or connector; raise the ceiling."])}
      </div>
      <p class="fliphint">Tap a tile to turn it.</p>`},
  "aspects":{e:"Four aspects", t:"Two for the machine. Two for the human.",
    h:`<p class="body-txt" style="font-size:clamp(16px,2vw,20px)">Inside the posture sit four aspects: two for how you work the tool, two for what the tool is for.</p>
      <div class="matrix">
        <div class="mcard"><h3>Co-Author AI</h3><div class="ssub">the machine</div><p style="margin:0;color:var(--muted);font-size:15px;line-height:1.5">You learn from it; it learns from you. Feed your judgement back in. Push its boundary out.</p></div>
        <div class="mcard"><h3>Govern AI</h3><div class="ssub">the machine</div><p style="margin:0;color:var(--muted);font-size:15px;line-height:1.5">Deploy, delegate, discern. Operate it and rule it. Discern is the verb that catches its bias.</p></div>
        <div class="mcard secure"><h3>Transform the Human</h3><div class="ssub">the human</div><p style="margin:0;color:var(--muted);font-size:15px;line-height:1.5">Supercharge thinking. Move the person past their own ceiling. The person is what changes, not the model.</p></div>
        <div class="mcard secure"><h3>Stay Human</h3><div class="ssub">the human</div><p style="margin:0;color:var(--muted);font-size:15px;line-height:1.5">Guard the part no model reaches: the noticing, the mentoring, the presence, the values.</p></div>
      </div>`},
  "loop":{e:"The loop", t:"A tool answers once. An agent runs a loop.",
    h:`<p class="body-txt">It sets a goal, acts, <b>checks its own work</b>, and tries again until the work is done.</p>
      <p class="body-txt" style="font-size:clamp(16px,2vw,20px);color:var(--muted)">That is what you govern. Not one answer. A process that keeps running when you are not watching.</p>`},
  "agent":{e:"The agent", t:"What an agent is. Five layers.",
    h:`<div class="stack">
      <div class="layer you"><span class="ln">You</span><span class="lg">Set the goal. Judge the result. Stay in command.</span></div>
      <div class="layer"><span class="ln">Harness</span><span class="lg">Runs the loop. Plans, acts, checks, repeats.</span></div>
      <div class="layer"><span class="ln">Capabilities</span><span class="lg">Skills, instructions, connectors, plugins.</span></div>
      <div class="layer"><span class="ln">Connections</span><span class="lg">Your files, mail, calendar, the web. MCP and the API.</span></div>
      <div class="layer"><span class="ln">Model</span><span class="lg">The engine that reasons.</span></div>
    </div>
    <p class="body-txt" style="font-size:15px;color:var(--muted);margin-top:14px">A Project bundles instructions, connectors, and skills for one scope. You sit on top, in command.</p>`},
  "govern":{e:"Govern it", t:"What goes where.",
    h:`<p class="body-txt" style="font-size:clamp(16px,2vw,21px)">We govern by deciding <b>what data goes where</b>, not by deciding which tool is cleverer.</p>
      <div class="matrix">
        <div class="mcard"><h3>Free Claude</h3><div class="ssub">claude.ai, free account</div>
          <ul class="uselist"><li><span class="mk yes">✓</span><span>Lesson ideas, drafts, public material</span></li><li><span class="mk yes">✓</span><span>Building your own skill or tool</span></li><li><span class="mk no">✕</span><span>No student or staff records</span></li><li><span class="mk no">✕</span><span>Nothing official or sensitive</span></li></ul></div>
        <div class="mcard secure"><h3>Pair and AIBots</h3><div class="ssub">GovTech, for official work</div>
          <ul class="uselist"><li><span class="mk yes">✓</span><span>Cleared for Restricted and Sensitive Normal</span></li><li><span class="mk yes">✓</span><span>Official school work</span></li><li><span class="mk yes">✓</span><span>No provider logging of your inputs</span></li></ul></div>
      </div>
      <p class="quote" style="margin-top:18px">Get your hands dirty, and then you understand both the potential and the limits.</p>
      <p class="src">Vivian Balakrishnan, Minister for Foreign Affairs, AI Engineer Singapore, 16 May 2026.</p>`},
  "forces":{e:"Five forces", t:"What AI takes. What it cannot.",
    h:`<p class="body-txt" style="font-size:clamp(16px,2vw,20px)">We need everyone to raise the tide; with AI, every force has become more critical, and more nuanced.</p>
      <p class="src" style="margin:0 0 10px">After Sergiovanni's five forces. The bottom two make a school run; the top three make it good.</p>
      <div class="ladder">
        <div class="rung keep"><span class="lvl">Cultural</span><span class="role2">Values and beliefs. The keeper of meaning.</span><span class="fx frees">stays yours</span></div>
        <div class="rung keep"><span class="lvl">Symbolic</span><span class="role2">What you notice tells the school what counts.</span><span class="fx frees">stays yours</span></div>
        <div class="rung"><span class="lvl">Educational</span><span class="role2">Teaching and curriculum. The lead learner.</span><span class="fx aids">AI assists, you judge</span></div>
        <div class="rung"><span class="lvl">Human</span><span class="role2">Relationships and morale. The motivator.</span><span class="fx aids">AI clears the admin</span></div>
        <div class="rung"><span class="lvl">Technical</span><span class="role2">Planning and logistics. The manager.</span><span class="fx takes">AI absorbs</span></div>
      </div>`},
  "heart":{e:"Your language", t:"Last year, VOICE. This year, HEART.",
    h:`<p class="body-txt" style="font-size:clamp(16px,2vw,20px)">VOICE is how we lead; HEART is what it is for. Five pairs, each reaching the other. The three we lean on today are lit.</p>
      <div class="polar">
        <div class="row">Honour <span class="amp">through</span> Values</div>
        <div class="row lit">Engagement <span class="amp">through</span> Ownership</div>
        <div class="row">Affinity <span class="amp">through</span> Inclusion</div>
        <div class="row lit">Relatedness <span class="amp">through</span> Contribution</div>
        <div class="row lit">Transformation <span class="amp">through</span> Empowerment</div>
      </div>
      <p class="body-txt" style="font-size:15px;color:var(--muted);margin-top:16px">People engage with what they own, so staff must build the tool, not watch a demo. We used to share what we know; now we share what we can do.</p>`},
  "mirror":{e:"The mirror", t:"A skill reflects whoever made it.",
    h:`<p class="body-txt">It learns our best day and our blind spots alike. One voice can pass as the whole school's. And what we never write down is never captured.</p>`},
  "postures":{e:"The 5 Ps", t:"Postures, not a ladder.",
    h:`<p class="body-txt" style="font-size:clamp(16px,2vw,21px)">Set per task, by data and stakes. <b>Partner does not beat Prohibit.</b> The right posture is the one the task calls for.</p>
      <div class="flipgrid gauto">
        ${flipTile("Prohibit","keep AI out","⛔",["Sensitive, official, or the values call.","Some things AI never touches."])}
        ${flipTile("Polish","refine, not originate","✨",["You write it; AI sharpens it.","Never let it originate the message."])}
        ${flipTile("Plan","think it through","🗺️",["Reason it out with you.","You decide."])}
        ${flipTile("Produce","draft with you","📝",["It drafts on your standard.","You own and answer for it."])}
        ${flipTile("Partner","co-author, you own","🤝",["You co-author with AI.","Highest trust, fullest ownership."])}
      </div>
      <p class="fliphint">Tap a card to turn it.</p>`},
  "flash":{e:"See it", t:"Built. Free. Hosted.",
    h:`<p class="body-txt" style="font-size:clamp(16px,2vw,21px)">A colleague built these on a free account, in a browser. The same way you will build yours.</p>
      <div class="closegrid">
        <div class="cc"><div class="n">→</div><h3>Co-Cher</h3><p>A lesson design and classroom layout helper, built on E21CC. A teacher made it.</p></div>
        <div class="cc"><div class="n">→</div><h3>SgSL</h3><p>A Singapore Sign Language reader. Still rough, and that is the point. Ship, then fix in the open.</p></div>
        <div class="cc"><div class="n">→</div><h3>Yours next</h3><p>One staff job, one tool. Built today, hosted this week.</p></div>
      </div>`},
  "wow":{e:"Watch it run", t:"No terminal. I asked. It built.",
    h:`<p class="body-txt">I describe a chemistry clip. The agent writes the code, renders it, <b>checks the frames, fixes what broke</b>, and adds narration. I never opened a command line.</p>
      <div class="chips"><span class="chip">Plan</span><span class="chip">Write code</span><span class="chip">Render</span><span class="chip"><b>Check and fix</b></span><span class="chip">Narrate</span></div>
      <p class="body-txt" style="font-size:15px;color:var(--muted);margin-top:16px">The point is the leap. I stopped making each clip. I built the thing that makes them.</p>`},
  "build":{e:"Get your hands dirty", t:"Now you build.",
    h:`<p class="body-txt" style="font-size:clamp(16px,2vw,21px)">Free accounts are fine. Pick how far to take it, then how to work.</p>
      <div class="closegrid">
        <div class="cc"><div class="n">1</div><h3>A skill</h3><p>A school-context skill from your public website.</p></div>
        <div class="cc"><div class="n">2</div><h3>A tool</h3><p>One staff job. A PD summary. A feedback helper.</p></div>
        <div class="cc"><div class="n">3</div><h3>A dashboard</h3><p>A hosted page anyone can open. A team second brain.</p></div>
      </div>
      <p class="body-txt" style="font-size:15px;color:var(--muted);margin-top:16px">Next: the Relay, in threes. Maker, User, Governor.</p>`},
  "close":{e:"The close", t:"Human agency in an agentic age.",
    h:`<p class="body-txt">Agentic AI pursues goals on its own. <b>Human agency decides which goals are worth pursuing</b>, why, and for whom. No system settles that. It is, and stays, ours. You cannot govern it on a brief, and today you have built one.</p>`}
};

/* ---------- util ---------- */
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));}

/* ---------- init ---------- */
if(!ROOM) ROOM="BTY-SL";
defaultTeams().forEach(function(n){teams.push({name:n,score:0});});
/* tap any flip tile (cos, pilot, postures) to turn it; one delegated listener survives re-renders */
document.getElementById("stage").addEventListener("click", function(e){
  const t=e.target.closest(".fliptile"); if(t) t.classList.toggle("flipped");
});
loadMqtt(); renderStage(); whenMqttReady(connect);
</script>
