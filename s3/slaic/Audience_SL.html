<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leading with AI · Your Companion</title>
<style>
  :root{
    --ink:#1d2a2b;--ink-soft:#3c4f4d;--muted:#5d6b6a;
    --paper:#f4f1ea;--soft:#e8ede9;--card:#fbfaf6;--line:#d6ddd6;
    --accent:#2f7d72;--accent-d:#25655c;--amber:#b7791f;--rust:#9a3b3b;--dark:#16282a;--green:#2f7d5b;
    --serif:Georgia,"Times New Roman",serif;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  @media (prefers-reduced-motion: reduce){*{animation:none !important;transition:none !important;}}
  body{margin:0;font-family:var(--sans);background:var(--paper);color:var(--ink);line-height:1.55;}
  .app{max-width:680px;margin:0 auto;padding:0 18px 60px;}

  .statusbar{position:sticky;top:0;z-index:30;background:var(--dark);color:#eaf1ee;
    display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:3px solid var(--accent);}
  .statusbar .brand{font-family:var(--serif);font-size:16px;}
  .statusbar .brand b{color:var(--accent);}
  .conn{display:flex;align-items:center;gap:7px;font-size:12px;color:#9fb4ae;}
  .dot{width:9px;height:9px;border-radius:50%;background:#6e807d;}
  .dot.on{background:#5bb89f;box-shadow:0 0 0 3px rgba(91,184,159,.25);}
  .dot.off{background:var(--rust);}
  .netbanner{position:sticky;top:46px;z-index:29;background:var(--amber);color:#1a1206;
    font-size:13.5px;font-weight:600;line-height:1.45;padding:10px 16px;text-align:center;}
  .netbanner .btn.sm{margin-left:6px;vertical-align:middle;background:#1a1206;color:#fff;}

  .view{padding:26px 0;animation:fade .35s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .eyebrow{letter-spacing:.2em;text-transform:uppercase;font-size:11px;font-weight:800;color:var(--accent-d);}
  h1{font-family:var(--serif);font-size:32px;line-height:1.08;margin:8px 0 6px;color:var(--ink);}
  h2{font-family:var(--serif);font-size:25px;line-height:1.12;margin:6px 0 10px;color:var(--ink);}
  p.lede{font-size:16px;color:var(--muted);margin:0 0 18px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px;
    box-shadow:0 8px 22px rgba(20,40,42,.06);margin-bottom:16px;}
  label.f{display:block;font-size:13px;font-weight:700;color:var(--ink);margin:14px 0 6px;}
  input[type=text],textarea{width:100%;font-family:var(--sans);font-size:15px;padding:12px 14px;
    border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);resize:vertical;}
  textarea{min-height:64px;}
  .qline{margin-bottom:12px;}
  input:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(47,125,114,.16);}

  .scale{display:flex;gap:8px;margin:6px 0 4px;}
  .scale button{flex:1;border:1.5px solid var(--line);background:#fff;border-radius:12px;padding:16px 0;
    font-family:var(--serif);font-size:24px;color:var(--ink);cursor:pointer;transition:.15s;}
  .scale button:hover{border-color:var(--accent);}
  .scale button.sel{background:var(--accent);color:#fff;border-color:var(--accent);}
  .lab{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);margin-top:4px;}

  .qhead{display:flex;align-items:center;gap:14px;margin-bottom:8px;}
  .qtag{font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:800;color:var(--accent-d);}
  .claim{font-family:var(--serif);font-size:22px;color:var(--ink);margin:2px 0 16px;line-height:1.25;}
  .opt{display:block;width:100%;text-align:left;border:1.5px solid var(--line);background:#fff;
    border-radius:12px;padding:14px 16px;margin-bottom:10px;font-size:16px;cursor:pointer;transition:.15s;color:var(--ink);}
  .opt:hover{border-color:var(--accent);}
  .opt.picked{border-color:var(--accent);background:var(--soft);}
  .opt.correct{border-color:var(--green);background:#e7f4ec;}
  .opt.wrong{border-color:var(--rust);background:#f7ece9;}
  .opt .mark{font-weight:800;margin-right:8px;}
  .why{border-left:3px solid var(--accent);background:#fff;padding:12px 15px;border-radius:0 10px 10px 0;font-size:14.5px;margin-top:8px;}
  .why b{color:var(--ink);}
  .whynot{margin-top:12px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 15px;}
  .whynot .wntitle{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;font-weight:800;color:var(--rust);margin-bottom:8px;}
  .whynot .wnrow{font-size:13.5px;color:var(--ink-soft);line-height:1.4;padding:6px 0;border-top:1px solid var(--line);}
  .whynot .wnrow:first-of-type{border-top:none;}
  .whynot .wnrow b{margin-right:6px;color:var(--muted);}
  .whynot .rd, .why .rd{color:var(--rust);font-weight:800;}
  .verdict{font-weight:800;font-size:13px;margin-bottom:4px;}
  .verdict.ok{color:var(--green);}.verdict.no{color:var(--rust);}
  .waitmark{font-size:13px;color:var(--muted);margin-top:12px;font-style:italic;}

  .beat{border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:14px;background:var(--card);}
  .beat .wsw{font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:800;color:var(--accent-d);}
  .beat .qx{font-family:var(--serif);font-size:18px;color:var(--ink);margin:4px 0 8px;}

  .pblock{border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:14px;background:var(--card);}
  .pblock .pl{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .pblock .pchip{font-family:var(--serif);font-weight:800;color:#fff;background:var(--accent);
    width:30px;height:30px;border-radius:8px;display:grid;place-items:center;font-size:16px;}
  .pblock .pname{font-size:12px;letter-spacing:.1em;text-transform:uppercase;font-weight:800;color:var(--accent-d);}
  .pblock .pq{font-size:14px;color:var(--ink);font-weight:700;}
  .sharerow{display:flex;align-items:center;gap:10px;margin-top:8px;flex-wrap:wrap;}
  .sharehint{font-size:11.5px;color:var(--muted);}
  .sharetog{display:inline-flex;border:1.5px solid var(--line);border-radius:999px;overflow:hidden;margin-top:10px;}
  .sharetog .seg{border:none;background:#fff;color:var(--muted);font-size:12.5px;font-weight:700;padding:8px 16px;cursor:pointer;font-family:var(--sans);transition:.12s;}
  .sharetog .seg[data-v="1"].on{background:var(--accent);color:#fff;}
  .sharetog .seg[data-v="0"].on{background:var(--ink-soft);color:#fff;}

  button.btn{font-family:var(--sans);font-size:15px;font-weight:700;border:none;border-radius:12px;
    padding:13px 22px;cursor:pointer;background:var(--accent);color:#fff;transition:.15s;}
  button.btn:hover{background:var(--accent-d);}
  button.btn.ghost{background:#fff;color:var(--accent-d);border:1.5px solid var(--accent);}
  button.btn.sm{font-size:13px;padding:10px 14px;}
  button.btn:disabled{opacity:.45;cursor:default;}
  .doneflag{display:inline-flex;align-items:center;gap:6px;color:var(--green);font-weight:700;font-size:14px;margin-top:6px;}

  .delta{font-family:var(--serif);font-size:42px;color:var(--ink);text-align:center;margin:8px 0;}
  .delta .up{color:var(--green);}

  .hold{text-align:center;padding:50px 0;}
  .hold .ring{width:54px;height:54px;border-radius:50%;border:4px solid var(--soft);border-top-color:var(--accent);
    margin:0 auto 18px;animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ===== mirror: watch slides rendered from the presenter's broadcast content ===== */
  .mirror h2{font-size:clamp(24px,6.4vw,34px);line-height:1.1;}
  .mirror .mbody{margin-top:12px;}
  .mirror .mhint{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.16em;margin-top:24px;text-align:center;}
  .mirror .body-txt{font-size:clamp(16px,4.4vw,20px);color:var(--ink);line-height:1.45;margin:0 0 14px;font-weight:400;}
  .mirror .body-txt b{color:var(--accent-d);font-weight:700;}
  .mirror .kicker{font-size:clamp(17px,4.8vw,22px);font-weight:700;line-height:1.35;}
  .mirror .slideicon{font-size:34px;line-height:1;margin:2px 0 12px;}
  .mirror .frameq{font-family:var(--serif);font-size:clamp(18px,5vw,24px);line-height:1.25;margin:12px 0;font-weight:700;color:var(--ink);}
  .mirror .frameq b{color:var(--accent-d);}
  .mirror .src{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.12em;line-height:1.6;display:block;margin-top:10px;}
  .mirror .quote{font-family:var(--serif);font-size:clamp(19px,5.4vw,26px);font-style:italic;line-height:1.3;margin:8px 0 10px;}
  .mirror .quote b{color:var(--accent-d);font-style:normal;}
  .mirror .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
  .mirror .chip{border:1px solid var(--line);border-radius:99px;padding:8px 14px;font-size:14px;background:#fff;}
  .mirror .chip b{color:var(--accent-d);}
  .mirror .flipgrid,.mirror .closegrid{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px;}
  @media(min-width:480px){.mirror .flipgrid.g2{grid-template-columns:1fr 1fr;}}
  .mirror .flipcol{display:flex;flex-direction:column;gap:10px;margin-top:12px;}
  .mirror .fliptile{position:relative;cursor:pointer;}
  .mirror .fliptile .inner{position:relative;display:grid;transition:transform .55s;transform-style:preserve-3d;}
  .mirror .fliptile.flipped .inner{transform:rotateY(180deg);}
  .mirror .fliptile .face{grid-area:1/1;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    border:1px solid var(--line);border-radius:14px;padding:14px 16px;background:#fff;display:flex;flex-direction:column;justify-content:center;min-height:74px;}
  .mirror .fliptile .back{transform:rotateY(180deg);background:var(--soft);border-color:var(--accent);}
  .mirror .fliptile .fw{font-family:var(--serif);font-weight:800;font-size:clamp(17px,4.8vw,22px);color:var(--ink);}
  .mirror .fliptile .fs{font-size:12.5px;color:var(--muted);margin-top:3px;}
  .mirror .fliptile .fi{font-size:22px;margin-bottom:6px;line-height:1;}
  .mirror .fliptile .fl{font-size:13.5px;color:var(--ink);line-height:1.4;margin:2px 0;}
  .mirror .fliptile.ftkeep .front{border-left:5px solid var(--accent);}
  .mirror .fliptile.ftaids .front{border-left:5px solid var(--amber);}
  .mirror .fliptile.fttakes .front{border-left:5px solid var(--rust);}
  .mirror .fliptile.ftkeep .fs{color:var(--accent-d);font-weight:700;}
  .mirror .fliptile.ftaids .fs{color:var(--amber);font-weight:700;}
  .mirror .fliptile.fttakes .fs{color:var(--rust);font-weight:700;}
  .mirror .fliphint{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.14em;margin-top:12px;}
  .mirror .matrix{display:grid;grid-template-columns:1fr;gap:10px;margin-top:10px;}
  @media(min-width:560px){.mirror .matrix{grid-template-columns:1fr 1fr;}}
  .mirror .mcard{border:1px solid var(--line);border-radius:14px;padding:14px 16px;background:#fff;}
  .mirror .mcard h3{margin:0 0 4px;font-size:17px;font-family:var(--serif);}
  .mirror .mcard .ssub{font-size:12px;color:var(--muted);margin-bottom:8px;}
  .mirror .mcard.secure{border-color:var(--accent);}
  .mirror .mcard.machine{border-color:#aab6bd;background:linear-gradient(160deg,rgba(140,160,175,.10),rgba(140,160,175,.02));}
  .mirror .mcard.human{border-color:#c19b74;background:linear-gradient(160deg,rgba(184,142,104,.12),rgba(184,142,104,.03));}
  .mirror .mcard .tone{font-size:10px;letter-spacing:.2em;text-transform:uppercase;font-weight:800;margin-bottom:5px;color:var(--muted);}
  .mirror .mcard.human .tone{color:#a97b4f;}
  .mirror .uselist{list-style:none;margin:0;padding:0;font-size:13.5px;}
  .mirror .uselist li{display:flex;gap:8px;align-items:flex-start;padding:4px 0;color:var(--ink);}
  .mirror .uselist .mk{flex:none;width:17px;height:17px;border-radius:50%;display:grid;place-items:center;font-size:10px;font-weight:700;color:#fff;margin-top:2px;}
  .mirror .mk.yes{background:var(--accent);}
  .mirror .mk.no{background:var(--rust);}
  .mirror .hv{display:flex;align-items:center;justify-content:center;gap:clamp(12px,5vw,30px);margin-top:14px;flex-wrap:wrap;}
  .mirror .hvcol{display:flex;flex-direction:column;gap:6px;text-align:center;}
  .mirror .hvh{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);font-weight:800;margin-bottom:4px;}
  .mirror .hvw{font-family:var(--serif);font-size:clamp(17px,4.8vw,24px);font-weight:700;color:var(--ink);line-height:1.15;}
  .mirror .hvw.lit{color:var(--accent-d);}
  .mirror .hvthrough{font-family:var(--serif);font-style:italic;font-size:clamp(19px,5.4vw,26px);color:var(--accent-d);}
  .mirror .gridc{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px;}
  @media(min-width:560px){.mirror .gridc.g5,.mirror .gridc.g4{grid-template-columns:1fr 1fr;}}
  .mirror .gridc .c{border:1px solid var(--line);border-radius:12px;padding:12px 14px;text-align:center;background:#fff;}
  .mirror .gridc .c b{display:block;font-family:var(--serif);font-size:15px;margin-bottom:4px;color:var(--ink);}
  .mirror .gridc .c span{font-size:13px;color:var(--muted);line-height:1.45;}
  .mirror .cc{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;}
  .mirror .cc .n{font-size:24px;}
  .mirror .cc h3{margin:8px 0 6px;font-size:17px;font-family:var(--serif);}
  .mirror .cc p{color:var(--muted);font-size:13.5px;margin:0;line-height:1.5;}
  .mirror .shots{display:grid;grid-template-columns:1fr;gap:12px;margin-top:12px;}
  .mirror .shot{margin:0;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fff;}
  .mirror .shot img{width:100%;height:150px;object-fit:cover;object-position:top center;display:block;}
  .mirror .shot figcaption{padding:10px 12px;font-size:12.5px;color:var(--muted);line-height:1.45;}
  .mirror .shot figcaption b{color:var(--accent-d);display:block;font-family:var(--serif);font-size:15px;margin-bottom:2px;}
  .mirror .shot .ph{height:150px;display:grid;place-items:center;border-bottom:1px solid var(--line);text-align:center;padding:0 14px;
    font-family:var(--serif);font-size:17px;color:var(--accent-d);
    background:repeating-linear-gradient(45deg,transparent,transparent 12px,rgba(47,125,114,.05) 12px,rgba(47,125,114,.05) 24px);}
  @media (prefers-reduced-motion: reduce){.mirror .fliptile .inner{transition:none;}}

  /* agent loop diagram · same block as the presenter, light palette; presenter drives the beats */
  #agent-widget{--ag-accent:#2f7d72;--ag-dark:#16282a;--ag-line:#d6ddd6;--ag-muted:#5d6b6a;--ag-ink:#1d2a2b;margin-top:6px;}
  #agent-widget .agwrap{width:100%;overflow:hidden;margin:0 auto;}
  #agent-widget .agcanvas{position:relative;background:linear-gradient(180deg,#fbfaf7,#ecefe8);border:1px solid var(--ag-line);border-radius:14px;}
  #agent-widget .edge{position:absolute;inset:0;width:900px;height:560px;pointer-events:none;}
  #agent-widget .node{position:absolute;transform:translate(-50%,-50%);background:#fff;border:1.5px solid var(--ag-line);border-radius:12px;padding:.7em .9em;text-align:center;transition:box-shadow .3s,border-color .3s,opacity .3s;min-width:120px;}
  #agent-widget .node .t{font-family:var(--serif);font-weight:700;font-size:17px;color:var(--ag-ink);}
  #agent-widget .node .s{font-size:12px;color:var(--ag-muted);margin-top:.15em;}
  #agent-widget .node.lit{border-color:var(--ag-accent);box-shadow:0 0 0 4px rgba(47,125,114,.16),0 8px 24px rgba(47,125,114,.18);}
  #agent-widget #nHarness{background:var(--ag-dark);border-color:var(--ag-dark);min-width:190px;padding:.9em;}
  #agent-widget #nHarness .t{color:#fff;}#agent-widget #nHarness .s{color:#9bb0ab;}
  #agent-widget #nOutput{background:#f1f6f2;border-color:#cfe0d4;opacity:0;}
  #agent-widget #nOutput.show{opacity:1;}
  #agent-widget .promptbox{min-width:300px;max-width:380px;}
  #agent-widget .promptbox .p{font-size:14px;color:var(--ag-ink);line-height:1.35;}
  #agent-widget .tags{display:flex;gap:.3em;justify-content:center;margin-top:.5em;flex-wrap:wrap;}
  #agent-widget .tags span{font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ag-accent);background:#e8ede9;border-radius:999px;padding:.2em .6em;}
  #agent-widget .ring2{position:absolute;left:450px;top:260px;width:188px;height:188px;border-radius:50%;border:2.5px dashed var(--ag-accent);transform:translate(-50%,-50%);opacity:0;transition:opacity .3s;}
  #agent-widget .ring2.on{opacity:.65;animation:agspin 3.4s linear infinite;}
  #agent-widget .agpass{position:absolute;left:450px;top:332px;transform:translate(-50%,-50%);font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--ag-accent);opacity:0;transition:opacity .3s;}
  #agent-widget .agpass.on{opacity:1;}
  #agent-widget .agcheck{position:absolute;left:606px;top:204px;transform:translate(-50%,-50%);font-size:13px;font-weight:700;border-radius:999px;padding:.28em .8em;opacity:0;transition:opacity .3s;z-index:6;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.14);}
  #agent-widget .agcheck.on{opacity:1;}
  #agent-widget .agcheck.fail{background:#f7e3dd;color:#b1452b;}#agent-widget .agcheck.pass{background:#e3f0e7;color:#3f7d54;}
  #agent-widget .pulse2{position:absolute;left:450px;top:70px;width:18px;height:18px;border-radius:50%;background:var(--ag-accent);transform:translate(-50%,-50%);transition:left .65s cubic-bezier(.5,.05,.3,1),top .65s cubic-bezier(.5,.05,.3,1);box-shadow:0 0 0 6px rgba(47,125,114,.2),0 0 18px rgba(47,125,114,.5);z-index:5;}
  #agent-widget .excap{font-size:clamp(15px,4.2vw,19px);color:var(--ink);font-style:italic;min-height:1.5em;margin:12px auto 0;text-align:center;}
  #agent-widget .agrow{display:none;}
  @keyframes agspin{to{transform:translate(-50%,-50%) rotate(360deg)}}

  .log .logcard{border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:14px;background:#fff;}
  .log .logcard h3{font-family:var(--serif);margin:0 0 4px;color:var(--ink);font-size:20px;}
  .log .ttl{font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:800;color:var(--accent-d);}
  .log ul{margin:6px 0 0;padding-left:18px;font-size:14px;}
  .log .good li::marker{color:var(--green);}
  .log .note li::marker{color:var(--rust);}
  .pillrow{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
  .pill{font-size:12px;background:var(--soft);border:1px solid var(--line);border-radius:99px;padding:4px 11px;}
  .hint{font-size:12.5px;color:var(--muted);margin-top:8px;}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;
    padding:10px 18px;border-radius:99px;font-size:13px;opacity:0;transition:.3s;z-index:40;}
  .toast.show{opacity:1;}

  @media print{
    .statusbar,.hint,#printbar,.toast{display:none !important;}
    body{background:#fff;}
    .log .logcard{break-inside:avoid;box-shadow:none;}
    .app{padding:0;max-width:none;}
  }

  /* ===== round 12: bigger mirror type + new layouts ===== */
  .mirror .body-txt{font-size:clamp(17px,4.6vw,21px);margin-bottom:16px;}
  .mirror .fliptile .fw{font-size:clamp(18px,5vw,23px);}
  .mirror .fliptile .fl{font-size:clamp(14px,3.8vw,17px);}
  .mirror .flipcol{gap:12px;}
  .mirror .quote{font-size:clamp(18px,5vw,24px);}
  .mirror .quad{display:grid;grid-template-columns:1fr;gap:12px;margin-top:12px;}
  .mirror .quad .qcell{border:1px solid var(--line);border-radius:14px;padding:14px 16px;background:#fff;}
  .mirror .quad .qcell .qh{font-family:var(--serif);font-weight:800;font-size:clamp(16px,4.4vw,20px);color:var(--accent-d);margin-bottom:6px;}
  .mirror .quad .qcell p{margin:0;font-size:clamp(14px,3.8vw,17px);color:var(--ink);line-height:1.5;}
  .mirror .quad .shot img{height:150px;}
  .mirror .pentagon{display:flex;flex-direction:column;gap:10px;margin-top:12px;}
  .mirror .pentagon .prow{display:flex;flex-direction:column;gap:10px;}

  /* true pentagon: stacks vertically on the phone */
  .pentagon5{display:flex;flex-direction:column;gap:12px;margin:14px auto 0;max-width:520px;}
  .pentagon5 .fliptile{width:100%;}
  /* clean, colour-accurate print -> Save as PDF (crisp vector, no app chrome) */
  @media print{
    @page{margin:12mm;}
    html,body{background:#fff !important;}
    .statusbar,.netbanner,.toast,#printbar,button.btn{display:none !important;}
    .app{max-width:100% !important;padding:0 !important;}
    .log .logcard{break-inside:avoid;page-break-inside:avoid;box-shadow:none;border:1px solid #cfd6cb;margin-bottom:10px;}
    *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;}
  }
</style>
</head>
<body>

<div class="statusbar">
  <div class="brand"><b>Leading</b> with AI</div>
  <div class="conn"><span class="dot" id="dot"></span><span id="connlbl">offline</span>
    <button onclick="if(confirm('Start fresh? This clears your answers and rejoins.'))location.reload()" title="Start fresh" style="margin-left:8px;background:transparent;border:1px solid rgba(255,255,255,.25);color:#cdd6e6;border-radius:8px;padding:2px 9px;font-size:13px;cursor:pointer;">↻</button></div>
</div>

<div class="netbanner" id="netbanner" style="display:none;"></div>
<div class="app"><div id="view"></div></div>
<div class="toast" id="toast"></div>

<script>
/* ===== CONFIG · must match Presenter_SL.html exactly ===== */
/* Day of the session, point both files at your own broker. The default below is
   the public HiveMQ test broker, the same one the working s3/paic session uses;
   it is proven to connect in the browser from this venue. (An earlier switch to
   the Eclipse 443 broker was reverted: it failed the WSS handshake.) For a
   private room with auth, swap in a managed endpoint and set MQTT_USER and
   MQTT_PASS. These four lines must match Presenter_SL.html byte for byte. */
const MQTT_URL  = "wss://broker.hivemq.com:8884/mqtt";  // public test broker, matches the working s3/paic config
const TOPIC_NS  = "leadai-bty";                          // unique token; harder to guess than "leadai"
const MQTT_USER = "";                                    // broker username, if required
const MQTT_PASS = "";                                    // broker password, if required
/* ======================================================== */

const me = Math.random().toString(36).slice(2,9);
const S = { room:"", name:"", confIn:null, confOut:null,
            quiz:{}, reveal:{}, share:{}, dvote:{} };

const QUIZ = [
  { tag:"What makes it new", claim:"An agent differs from a chatbot because it…",
    options:["Uses a bigger model and more training data","Runs a loop: plans, acts, checks its own work, repeats","Remembers everything we have told it","Stays connected to the live internet"], answer:1,
    why:"<b>It runs a loop.</b> A tool answers once. An agent sets a goal, acts, checks against it, and goes round again until done. We govern a process that keeps running when we are not watching.",
    note:"An agent runs a loop; we govern the process, not one answer." },
  { tag:"Your call", claim:"A KP wants to paste the whole cohort's exam records into free Claude to surface weak topics. The right call is…",
    options:["Approve once the names are stripped out","Approve if the chat is deleted afterwards","Decline; the records stay on the government platform","Approve as a small one-subject pilot"], answer:2,
    why:"<b>Decline.</b> We govern by deciding what data goes where, not which tool is cleverer. Records stay on Pair and AIBots. Stripping names is fine for open material like survey themes, but a whole cohort of exam records is official data: it stays on the cleared platform either way, and a full cohort can be re-identified.",
    note:"Decide what data goes where. Records stay on Pair and AIBots." },
  { tag:"Spot the risk", claim:"We ask one strong HOD to build the school's 'house voice' skill for all staff comms. The main risk is…",
    options:["The skill will quickly fall out of date","One person's voice and blind spots pass as the whole school's","Staff will not trust a tool they did not build","It may quietly leak sensitive data to the vendor"], answer:1,
    why:"<b>A skill reflects whoever made it.</b> One voice can pass as the whole school's, and what we never write down is never captured. Build it with many, and govern the blind spots.",
    note:"A skill reflects its maker. Build it with many; govern the blind spots." },
  { tag:"What stays yours", claim:"Across Sergiovanni's five forces, which must we never delegate to AI?",
    options:["Technical: timetabling and logistics","Human: relationships and morale","Cultural: what the school believes and stands for","Educational: teaching and curriculum"], answer:2,
    why:"<b>The cultural force.</b> AI absorbs the technical and clears the admin. The cultural and symbolic, what we notice and what we stand for, stay ours. Treating them as optional is the category error.",
    note:"AI absorbs the technical. The cultural and symbolic stay ours." },
  { tag:"True or false", claim:"Partner is the most advanced posture; aim to move every task there.",
    options:["True","False"], answer:1,
    why:"<b>False.</b> Postures, not a ladder. Set the posture per task, by data and stakes. Partner does not beat Prohibit. The right posture is the one the task calls for.",
    note:"Postures, not a ladder. The right posture fits the task." },
  { tag:"A clear breach",
    claim:"A teacher pasted a class list with named wellbeing notes into a free public chatbot to draft support plans. It is done. The strongest first move is…",
    options:["Delete the chat and remind the teacher quietly","Report it: log the breach and bring in our HOD ICT and the data protection officer","Wait and see if anything surfaces","Handle it alone; no need to escalate"], answer:1,
    why:"<b>Report it.</b> This crosses the line: sensitive student data went to an uncleared tool. Policy is to escalate, not to absorb it. Log the breach, bring in our HOD ICT or EdTech and the data protection officer, and work with the GovTech or DXD partner. Our autonomy runs up to the data boundary; past it, a breach is a reporting duty, not a judgement call.",
    note:"A breach is a reporting duty. Log it and escalate.", solo:true }
];
const BADS = [
  {0:"Size is <b class='rd'>not</b> the difference. A huge model with no loop still answers once.",
   2:"Memory is a feature, <b class='rd'>not</b> autonomy. Recall does not make it act, check, and retry.",
   3:"A connection is <b class='rd'>not</b> agency. A search tool fetches; it does not run a goal."},
  {0:"Stripping names is <b class='rd'>not</b> enough. A full cohort can be re-identified, and it is still official data.",
   1:"Deleting the chat does <b class='rd'>not</b> undo the exposure. A public tool may already have logged it.",
   3:"A smaller breach is <b class='rd'>still</b> a breach. Scale does not change where the data belongs."},
  {0:"Technical is exactly what AI <b class='rd'>can</b> absorb. Hand over the logistics.",
   1:"AI clears the admin here; relationships stay ours, but this is <b class='rd'>not</b> the force it most threatens.",
   3:"AI assists teaching and we judge, but the <b class='rd'>deepest</b> non-delegable is the cultural, symbolic core."},
  {0:"Going out of date is a maintenance issue, <b class='rd'>not</b> the core risk of a single author.",
   2:"Trust matters, but the deeper risk is one voice passing as <b class='rd'>everyone's</b>.",
   3:"A real concern, but separate. The mirror risk is <b class='rd'>whose</b> judgement the skill encodes."},
  {0:"<b class='rd'>False</b>. Postures are per task; Partner does not beat Prohibit."},
  {0:"Quietly deleting <b class='rd'>hides</b> a breach that must be logged and reported.",
   2:"Waiting <b class='rd'>lets</b> the exposure stand. A breach is a duty to act now.",
   3:"This is <b class='rd'>not</b> ours to absorb. Policy is to escalate and bring in the right people."}
];

const DILEMMAS = [
 {tag:"Modelling vs mandating", claim:"One way to get colleagues to experiment with AI safely and inventively is to\u2026",
  options:["Mandate it in appraisal goals","Model it ourselves, in the open","Fund the keen few and let it spread","Wait until the policy is signed"]}
];
const PS = [
  { p:"P", name:"Prohibit", q:"We will keep AI out of…", ph:"e.g. student records, anything official or sensitive", key:"prohibit" },
  { p:"P", name:"Polish",   q:"AI may polish, never originate…", ph:"e.g. the values message, the hard conversation", key:"polish" },
  { p:"P", name:"Plan",     q:"A planning loop I will hand to an agent…", ph:"e.g. timetable gaps, duty rosters, PD logistics", key:"plan" },
  { p:"P", name:"Produce",  q:"Something we will build and ship…", ph:"e.g. a feedback helper, a PD summary tool", key:"produce" },
  { p:"P", name:"Partner",  q:"Where staff co-author with AI, and own it…", ph:"e.g. lesson design, comms drafts", key:"partner" }
];

/* ---------- SYNC (MQTT over WebSocket) ---------- */
let client=null, wsOpen=false, hb=null, mySid=null, lastStageAt=0;
function loadMqtt(){
  if(window.mqtt || document.getElementById("mqttlib")) return;
  var s=document.createElement("script"); s.id="mqttlib";
  s.src="https://cdn.jsdelivr.net/npm/mqtt@5.10.1/dist/mqtt.min.js";
  s.onerror=function(){ cdnBlocked=true; setConn(false); };
  document.head.appendChild(s);
}
function whenMqttReady(cb,tries){ tries=tries||0;
  if(typeof mqtt!=="undefined"){ cb(); }
  else if(tries<60){ setTimeout(function(){whenMqttReady(cb,tries+1);},200); }
  else { cdnBlocked=true; setConn(false); toast("Network blocked the sync library"); }
}
function topic(){ return TOPIC_NS+"/"+S.room+"/bus"; }
function connect(){
  if(!S.room || typeof mqtt==="undefined"){ setConn(false); return; }
  const opts={clientId:"aud_"+me, clean:true, reconnectPeriod:2500, connectTimeout:8000, keepalive:30};
  if(MQTT_USER){ opts.username=MQTT_USER; opts.password=MQTT_PASS; }
  client = mqtt.connect(MQTT_URL, opts);
  client.on("connect", ()=>{ wsOpen=true; setConn(true); client.subscribe(topic());
    send({type:"join"}); if(mySid!==null) resyncMine(); clearInterval(hb);
    hb=setInterval(heartbeat,4000); });
  client.on("reconnect", ()=>setConn(false));
  client.on("offline", ()=>{ wsOpen=false; setConn(false); });
  client.on("close", ()=>{ wsOpen=false; setConn(false); });
  client.on("error", ()=>setConn(false));
  client.on("message", (t,payload)=>onMsg(payload.toString()));
}
function heartbeat(){
  if(!wsOpen) return;
  // Before we have learned the session, keep asking for the current stage.
  // Once synced, send a light heartbeat; but if broadcasts have gone quiet
  // (a dropped or lost stage), ask the presenter to resend.
  if(mySid===null){ send({type:"join"}); return; }
  if(lastStageAt && Date.now()-lastStageAt>10000) send({type:"req"});
  else send({type:"hb"});
}
function shareChannel(key){
  if(key.indexOf("question")===0) return "question";  // question1, question2, question3
  if(key==="r1"||key==="r2"||key==="r3") return "reflect";
  return "charter"; // the 5 Ps
}
function resyncMine(){
  // Re-publish this leader's own inputs so a reconnect, or a presenter reload,
  // rebuilds the room aggregates. Idempotent: every value is keyed by our id.
  if(S.confIn!=null) send({type:"confidence",phase:"in",value:S.confIn});
  if(S.confOut!=null) send({type:"confidence",phase:"out",value:S.confOut});
  for(const q in S.quiz){ if(S.quiz[q]!=null) send({type:"quiz",q:+q,answer:S.quiz[q]}); }
  for(const key in S.share){ const st=S.share[key];
    if(st && st.text) send({type:"share",channel:shareChannel(key),key:key,text:st.text,on:!!st.on}); }
}
function send(o){ o.from=me; o.room=S.room; o.sid=mySid; if(client && wsOpen){ try{client.publish(topic(), JSON.stringify(o));}catch(e){} } }
function onMsg(raw){
  let d; try{ d=JSON.parse(raw);}catch(e){ return; }
  if(!d || d.from===me) return;
  if(d.type==="reset"){ mySid=d.sid||mySid; resetAudience(); return; }
  if(d.type==="reqmine"){ if(d.sid && d.sid!==mySid) return; resyncMine(); return; }
  if(d.type==="stage"){
    const firstSid=(mySid===null);
    if(mySid===null) mySid=d.sid||null;
    if(d.sid && d.sid!==mySid) return;
    lastStageAt=Date.now();
    gotoStage(d);
    if(firstSid && mySid!==null) resyncMine();
  } else if(d.type==="reveal"){
    if(d.sid && d.sid!==mySid) return;
    S.reveal[d.q]=true; if(curView==="quiz"&&curQ===d.q) renderQuiz();
  }
}
function resetAudience(){
  S.confIn=null; S.confOut=null;
  S.quiz={}; S.reveal={}; S.share={};
  inQKeys=["question1"]; inSubmitted=false; S.dvote={};
  curStageKey=""; curView="welcome";
  renderWaiting("New session. Waiting for the facilitator to begin.");
}
let cdnBlocked=false, lastOnline=0, startTime=Date.now();
function setConn(on){
  document.getElementById("dot").className="dot "+(on?"on":"off");
  document.getElementById("connlbl").textContent = on ? ("following · "+S.room) : "reconnecting";
  if(on) lastOnline=Date.now();
  updateNetBanner();
}
function updateNetBanner(){
  const dot=document.getElementById("dot"); if(!dot) return;
  const b=document.getElementById("netbanner"); if(!b) return;
  const off=dot.classList.contains("off");
  const ref=lastOnline||startTime;
  if(S.room && off && Date.now()-ref>15000){
    // Reconnect is automatic; no button, so a participant cannot accidentally reset mid-session.
    b.textContent = cdnBlocked
      ? "We cannot load the live sync on this network. Keep this open; follow the main screen, and your card is on paper at your table."
      : "Reconnecting. Keep this open; follow the main screen, and your card is on paper at your table.";
    b.style.display="";
  } else { b.style.display="none"; }
}
setInterval(updateNetBanner,3000);

/* ---------- VIEW ROUTER (lockstep) ---------- */
let curView="connect", curQ=0, curD=0, curStageKey="", renderedKey=null;
function gotoStage(m){
  const sameKey=(m.key===curStageKey);
  const viewEmpty=!V().firstChild;
  // Re-render on a new stage, or when our view was lost (tab discarded, DOM
  // cleared) while module state survived. Skip a true no-op so the periodic
  // beacon never re-renders or scroll jumps a leader who is already in sync.
  if(sameKey && renderedKey===m.key && !viewEmpty){
    // same slide, but the agent loop beat may have moved: repaint without a re-render
    if(m.id==="watch" && m.key==="agent" && typeof m.ab==="number") audAgentPaint(m.ab);
    return;
  }
  curStageKey=m.key;
  for(const k in pubT){ clearTimeout(pubT[k]); } pubT={};   // drop pending publishes from the old view
  if(m.id==="quiz" && m.q!=null && m.rev) S.reveal[m.q]=true;
  switch(m.id){
    case "in": curView="in"; renderIn(); break;
    case "quiz": curView="quiz"; curQ=m.q||0; renderQuiz(); break;
    case "dilemma": curView="dilemma"; curD=m.d||0; renderDilemma(); break;
    case "charter": curView="charter"; renderCharter(); break;
    case "watch": curView="watch"; renderWatch(m); break;
    case "out": curView="out"; renderOut(); break;
    case "log": curView="log"; renderLog(); break;
    case "welcome": curView="welcome"; renderWaiting("We are about to begin."); break;
    default: break;
  }
  renderedKey=m.key;
  if(!sameKey) window.scrollTo({top:0,behavior:"smooth"});
}
const V=()=>document.getElementById("view");

/* ---------- CONNECT ---------- */
function renderConnect(){
  V().innerHTML=`<div class="view">
    <span class="eyebrow">A working session for school leaders</span>
    <h1>Leading with AI.</h1>
    <p class="lede">This is yours for the session, and yours to keep. Type the room code on the screen, then follow along.</p>
    <div class="card">
      <label class="f" for="room">Room code</label>
      <input type="text" id="room" placeholder="e.g. S3SL" autocomplete="off">
      <label class="f" for="name">Your name (optional, for your card)</label>
      <input type="text" id="name" placeholder="optional" autocomplete="off">
      <div style="margin-top:16px;"><button class="btn" id="join">Join the room</button></div>
      <p class="hint">Nothing here is stored anywhere. Your answers live on your screen and print at the end.</p>
    </div></div>`;
  const u=new URLSearchParams(location.search);
  if(u.get("room")) document.getElementById("room").value=u.get("room");
  document.getElementById("join").onclick=()=>{
    /* Hyphens/spaces are stripped so S3-SL, S3SL, and s3 sl all join the same
       room; must match the presenter's normalization. */
    S.room=(document.getElementById("room").value||"").trim().toUpperCase().replace(/[\s-]+/g,"");
    S.name=(document.getElementById("name").value||"").trim();
    if(!S.room){ toast("Enter the room code on screen"); return; }
    renderWaiting("You're in. Waiting for the facilitator to begin.");
    whenMqttReady(connect);
  };
}
function renderWaiting(msg){
  curView="welcome";
  V().innerHTML=`<div class="view hold"><div class="ring"></div>
    <h2>${msg}</h2><p class="lede">Keep this open. Your screen will move when we do.</p></div>`;
}

/* ---------- shareable field ---------- */
let pubT={};
function shareState(key){ return S.share[key]||(S.share[key]={text:"",on:true}); }
function sv(key){ const st=S.share[key]; return st?st.text:""; }
function shareTog(key,st){ return `<div class="sharetog" id="tg-${key}">
    <button type="button" class="seg ${st.on?'':'on'}" data-v="0">Private</button>
    <button type="button" class="seg ${st.on?'on':''}" data-v="1">Shared with the room</button></div>`; }
function shareHTML(key,placeholder){ const st=shareState(key);
  return `<textarea id="sf-${key}" placeholder="${placeholder}">${esc(st.text)}</textarea>${shareTog(key,st)}`; }
function wireShare(key,channel){
  const ta=document.getElementById("sf-"+key), tg=document.getElementById("tg-"+key);
  if(!ta||!tg) return;
  ta.oninput=()=>{ shareState(key).text=ta.value.trim(); schedulePublish(key,channel); };
  tg.querySelectorAll(".seg").forEach(b=>b.onclick=()=>{ const on=b.dataset.v==="1"; shareState(key).on=on;
    tg.querySelectorAll(".seg").forEach(x=>x.classList.toggle("on",(x.dataset.v==="1")===on));
    publishShare(key,channel); });
}
function schedulePublish(key,channel){ clearTimeout(pubT[key]); pubT[key]=setTimeout(()=>publishShare(key,channel),600); }
function publishShare(key,channel){ const st=shareState(key); send({type:"share",channel:channel,key:key,text:st.text,on:!!st.on}); }

/* ---------- READINESS IN ---------- */
let inQKeys=["question1"], inSubmitted=false;
function renderIn(){
  V().innerHTML=`<div class="view">
    <span class="eyebrow">Walking in</span>
    <h2>How ready are we?</h2>
    <p class="lede">Rate your own readiness, or the readiness of your school. One is just starting; five is well underway.</p>
    <div class="card">
      <div class="scale" id="sc"></div>
      <div class="lab"><span>1 · Just starting</span><span>5 · Well underway</span></div>
      <label class="f">The leadership questions on your mind today</label>
      <p class="hint" style="margin:0 0 10px">Add up to three. Shared with the room by default; tap a toggle to keep one private.</p>
      <div id="qwrap"></div>
      <button class="btn ghost sm" id="qadd" style="margin-top:2px;">+ Add another question</button>
      <div style="margin-top:14px;"><button class="btn" id="qsubmit">Submit my questions</button><span id="inflag"></span></div>
    </div></div>`;
  buildScale("sc","confIn",()=>{ send({type:"confidence",phase:"in",value:S.confIn}); });
  renderInQuestions();
  document.getElementById("qadd").onclick=()=>{ if(inQKeys.length>=3) return;
    inQKeys.push("question"+(inQKeys.length+1)); renderInQuestions(); };
  document.getElementById("qsubmit").onclick=()=>{ inSubmitted=true;
    inQKeys.forEach(k=>{ if(sv(k)) publishShare(k,"question"); });
    document.getElementById("inflag").innerHTML=' <span class="doneflag">✓ Shared. Thank you.</span>'; };
}
function renderInQuestions(){
  const wrap=document.getElementById("qwrap"); if(!wrap) return;
  wrap.innerHTML=inQKeys.map((k,i)=>{ const st=shareState(k);
    return `<div class="qline">
      <textarea id="sf-${k}" placeholder="${i===0?'What are you weighing as a leader on AI?':'Another question…'}">${esc(st.text)}</textarea>
      ${shareTog(k,st)}
    </div>`; }).join("");
  inQKeys.forEach(wireInQuestion);
  const add=document.getElementById("qadd"); if(add) add.style.display=inQKeys.length>=3?"none":"";
}
function wireInQuestion(k){
  const ta=document.getElementById("sf-"+k), tg=document.getElementById("tg-"+k);
  if(ta) ta.oninput=()=>{ shareState(k).text=ta.value.trim(); if(inSubmitted) schedulePublish(k,"question"); };
  if(tg) tg.querySelectorAll(".seg").forEach(b=>b.onclick=()=>{ const on=b.dataset.v==="1"; shareState(k).on=on;
    tg.querySelectorAll(".seg").forEach(x=>x.classList.toggle("on",(x.dataset.v==="1")===on));
    if(inSubmitted) publishShare(k,"question"); });  // live Share/Private update on the presenter
}

/* ---------- QUIZ ---------- */
function renderQuiz(){
  const q=QUIZ[curQ], picked=S.quiz[curQ], rev=!!S.reveal[curQ];
  V().innerHTML=`<div class="view">
    <span class="eyebrow">Predict, then reveal together</span>
    <div class="card">
      <div class="qhead"><div><div class="qtag">${q.tag}${q.solo?"":` · ${curQ+1} of 5`}</div></div></div>
      <div class="claim">${q.claim}</div>
      <div id="opts">${q.options.map((o,k)=>`<button class="opt" data-k="${k}"><span class="mark">${String.fromCharCode(65+k)}</span>${o}</button>`).join("")}</div>
      <div id="rev"></div>
    </div></div>`;
  const opts=V().querySelectorAll(".opt");
  opts.forEach(b=>{
    const k=+b.dataset.k;
    if(picked===k) b.classList.add("picked");
    if(rev){
      if(k===q.answer) b.classList.add("correct");
      if(k===picked&&k!==q.answer) b.classList.add("wrong");
      b.style.pointerEvents="none";
    }
    b.onclick=()=>{ if(S.reveal[curQ]) return; S.quiz[curQ]=k;
      send({type:"quiz",q:curQ,answer:k}); renderQuiz(); };
  });
  const r=document.getElementById("rev");
  if(rev){
    const ok=picked===q.answer;
    r.innerHTML=`<div class="why"><div class="verdict ${ok?'ok':'no'}">${ok?'You read it right.':'Worth a second look.'}</div>${q.why}</div>`
      +(BADS[curQ]?`<div class="whynot"><div class="wntitle">Why-Not · why the others miss</div>${q.options.map((o,k)=>(k!==q.answer&&BADS[curQ][k])?`<div class="wnrow"><b>${String.fromCharCode(65+k)}</b> <span>${BADS[curQ][k]}</span></div>`:"").join("")}</div>`:"");
  } else if(picked!=null){
    r.innerHTML=`<div class="waitmark">Answer in. Tap another to change it, up until we reveal together.</div>`;
  } else {
    r.innerHTML=`<div class="waitmark">Tap your answer. You can change it anytime before the reveal.</div>`;
  }
}

/* ---------- DILEMMA (no wrong answer) ---------- */
function renderDilemma(){
  const D=DILEMMAS[curD], picked=S.dvote[curD];
  V().innerHTML=`<div class="view">
    <span class="eyebrow">Where do you stand</span>
    <div class="card">
      <div class="qtag">${D.tag}</div>
      <div class="claim">${D.claim}</div>
      <div id="dopts">${D.options.map((o,k)=>`<button class="opt" data-k="${k}"><span class="mark">${String.fromCharCode(65+k)}</span>${o}</button>`).join("")}</div>
      <div class="waitmark">Share your views. This is what you feel, and is personal.</div>
    </div></div>`;
  V().querySelectorAll(".opt").forEach(btn=>{ const k=+btn.dataset.k;
    if(picked===k) btn.classList.add("picked");
    btn.onclick=()=>{ S.dvote[curD]=k; send({type:"dvote",di:curD,pick:k}); renderDilemma(); };
  });
}

/* ---------- REFLECTION ---------- */
/* ---------- COMMAND CHARTER (postures + one line to carry) ---------- */
function renderCharter(){
  V().innerHTML=`<div class="view">
    <span class="eyebrow">Your keepsake · my charter</span>
    <h2>My charter.</h2>
    <p class="lede">Consider what you are noticing from today. Set your postures, and the one line you will carry. A posture per line, in your own words. Each is shared to the room wall by default; tap a toggle to keep one private.</p>
    <div id="ch"></div>
    <div class="beat" style="margin-top:16px;"><div class="wsw">The one line I will carry</div>
      <div class="qx">One thing you will do, or stand for, next.</div>
      ${shareHTML("r1","The line I will carry is…")}</div>

    <p class="hint">Sharing is anonymous. Only the words appear on the wall, never your name.</p></div>`;
  const host=document.getElementById("ch");
  PS.forEach(p=>{
    const d=document.createElement("div"); d.className="pblock";

    publishShare("r1","reflect");

}

function renderWatch(m){
  const title=m&&m.title, eyebrow=m&&m.eyebrow, h=m&&m.h;
  if(h){
    // Mirror the presenter's slide, restyled for the phone. Content is sanitized:
    // it arrives over a public broker, so scripts and event handlers are stripped.
    V().innerHTML=`<div class="view mirror">
      ${eyebrow?`<span class="eyebrow">${esc(eyebrow)}</span>`:""}
      ${title?`<h2 style="margin-top:6px;">${esc(title)}</h2>`:""}
      <div class="mbody" id="mbody"></div>
      <p class="mhint">Mirrored from the main screen</p></div>`;
    document.getElementById("mbody").innerHTML=sanitizeHTML(h);
    if(m.key==="agent"){ audAgentFit(); audAgentPaint(typeof m.ab==="number"?m.ab:0); }
    return;
  }
  V().innerHTML=`<div class="view" style="text-align:center;padding-top:26px;">
    ${eyebrow?`<span class="eyebrow">${esc(eyebrow)}</span>`:""}
    ${title?`<h2 style="margin-top:8px;">${esc(title)}</h2>`:""}
    <p class="lede" style="margin-top:14px;">Eyes on the main screen, please.</p>
    <div style="font-size:26px;letter-spacing:.3em;color:var(--accent);margin-top:6px;">• • •</div></div>`;
}
/* Strip anything executable from mirrored slide HTML: it travels over a public
   MQTT broker, so a forged message must not be able to run code on this phone. */
function sanitizeHTML(html){
  const doc=new DOMParser().parseFromString("<div>"+html+"</div>","text/html");
  doc.querySelectorAll("script,iframe,object,embed,form,link,meta,base").forEach(n=>n.remove());
  doc.querySelectorAll("*").forEach(el=>{
    [...el.attributes].forEach(a=>{
      const n=a.name.toLowerCase(), v=(a.value||"").trim().toLowerCase();
      if(n.startsWith("on")) el.removeAttribute(a.name);
      else if((n==="href"||n==="src"||n==="xlink:href") && v.indexOf("javascript:")===0) el.removeAttribute(a.name);
    });
  });
  return doc.body.firstChild.innerHTML;
}
/* ---------- agent loop mirror · paint-only ----------
   Beat data must match wireAgent in Presenter_SL.html. The presenter drives;
   this only paints the beat it broadcasts (stage msg field `ab`). */
const AG_C={nInput:[450,70],nHarness:[450,260],nCaps:[130,250],nConn:[770,250],nModel:[450,430],nOutput:[450,512]};
const AG_Q="What is the capital of France?";

const AG_T=["goal","check","stop rule"];
const AG_CAP=[
  "A quick question arrives.",
  "The model answers in a single pass. No tools, no loop.",
  "A simple ask does not loop.",
  "Now a goal, with a check and a finish line.",
  "It plans the steps, then pulls our data through Connections. Pass 1 begins.",
  "It drafts with the model.",
  "It checks its own work against the goal. Not every theme is backed yet.",
  "So it revises and goes round again. This pass holds.",

];
const AG_BEATS=[
  {p:AG_Q,tags:[],at:"nInput",lit:["nInput"],out:null,ring:false,pass:null,check:null},
  {p:AG_Q,tags:[],at:"nModel",lit:["nHarness","nModel"],out:null,ring:false,pass:null,check:null},
  {p:AG_Q,tags:[],at:"nOutput",lit:["nOutput"],out:"A direct answer.",ring:false,pass:null,check:null},
  {p:AG_G,tags:AG_T,at:"nInput",lit:["nInput"],out:null,ring:false,pass:null,check:null},
  {p:AG_G,tags:AG_T,at:"nConn",lit:["nHarness","nConn"],out:null,ring:true,pass:1,check:null},
  {p:AG_G,tags:AG_T,at:"nModel",lit:["nModel"],out:null,ring:true,pass:1,check:null},
  {p:AG_G,tags:AG_T,at:"nHarness",lit:["nHarness"],out:null,ring:true,pass:1,check:"fail"},
  {p:AG_G,tags:AG_T,at:"nHarness",lit:["nHarness"],out:null,ring:true,pass:2,check:"pass"},
  {p:AG_G,tags:AG_T,at:"nOutput",lit:["nOutput"],out:"An evidence-backed one-page brief.",ring:false,pass:null,check:null}

function audAgentFit(){
  const wrap=document.getElementById("agwrap"), canvas=document.getElementById("agcanvas");
  if(!wrap||!canvas) return;
  const s=Math.min(1, wrap.clientWidth/900);
  canvas.style.transform="scale("+s+")"; canvas.style.transformOrigin="top left";
  canvas.style.marginLeft=Math.max(0,(wrap.clientWidth-900*s)/2)+"px";
  wrap.style.height=(560*s)+"px";
}
function audAgentPaint(i){
  const b=AG_BEATS[i]; if(!b) return;
  const $=id=>document.getElementById(id);
  if(!$("agcanvas")) return;
  $("agprompt").textContent=b.p;
  $("agtags").innerHTML=(b.tags||[]).map(t=>"<span>"+t+"</span>").join("");
  ["nInput","nHarness","nCaps","nConn","nModel","nOutput"].forEach(n=>{const e=$(n); if(e) e.classList.remove("lit");});
  (b.lit||[]).forEach(n=>{const e=$(n); if(e) e.classList.add("lit");});
  const p=AG_C[b.at]||AG_C.nHarness; $("agpulse").style.left=p[0]+"px"; $("agpulse").style.top=p[1]+"px";
  $("agring").classList.toggle("on", !!b.ring);
  const pass=$("agpass"); if(b.pass){ pass.textContent="Pass "+b.pass; pass.classList.add("on"); } else pass.classList.remove("on");
  const check=$("agcheck"); if(b.check){ check.className="agcheck on "+b.check; check.textContent=b.check==="fail"?"check: not yet":"check: pass"; } else check.className="agcheck";
  const out=$("nOutput"); if(b.out){ $("agout").textContent=b.out; out.classList.add("show"); } else out.classList.remove("show");
  const cap=$("agcap"); if(cap) cap.textContent=AG_CAP[i];
}

/* ---------- READINESS OUT ---------- */
function renderOut(){
  V().innerHTML=`<div class="view">
    <span class="eyebrow">Walking out</span>
    <h2>How ready are we now?</h2>
    <div class="card">
      <div class="scale" id="sc"></div>

      <div class="delta" id="delta">—</div>
      <p class="hint" id="dt" style="text-align:center;"></p>
    </div></div>`;
  buildScale("sc","confOut",()=>{ send({type:"confidence",phase:"out",value:S.confOut}); updateDelta(); });
  updateDelta();
}
function updateDelta(){
  const d=document.getElementById("delta"), t=document.getElementById("dt");
  if(!d) return;
  if(S.confIn==null||S.confOut==null){ d.textContent="—"; return; }
  const diff=S.confOut-S.confIn;
  d.innerHTML=S.confIn+" → <span class='up'>"+S.confOut+"</span>";
  t.textContent = diff>0 ? "Up "+diff+". That movement is the session."
              : diff===0 ? "Steady. Readiness is built by doing, not by knowing."
              : "Honesty counts more than the number. Keep building.";
}

/* ---------- SHARED scale ---------- */
function buildScale(host,key,cb){
  const h=document.getElementById(host); h.innerHTML="";
  for(let n=1;n<=5;n++){ const b=document.createElement("button"); b.textContent=n;
    if(S[key]===n) b.classList.add("sel");
    b.onclick=()=>{ S[key]=n; [...h.children].forEach(c=>c.classList.remove("sel")); b.classList.add("sel"); cb&&cb(); };
    h.appendChild(b);
  }
}

/* ---------- util ---------- */
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));}
let tT; function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");
  clearTimeout(tT);tT=setTimeout(()=>t.classList.remove("show"),1800);}

/* ---------- download command card as PNG ---------- */
function loadH2C(){
  if(window.html2canvas || document.getElementById("h2clib")) return;
  var s=document.createElement("script"); s.id="h2clib";
  s.src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js";
  document.head.appendChild(s);
}
function downloadCard(){
  var el=document.getElementById("loglog"); if(!el) return;
  function go(){
    toast("Building your image…");
    // iOS Safari caps a canvas at ~4096px/dimension; clamp scale so a tall card never renders blank
    var __sc=Math.max(1.5, Math.min(Math.min(4,Math.max(2,(window.devicePixelRatio||1)*1.5)), 3900/el.offsetHeight, 3900/el.offsetWidth));
    window.html2canvas(el,{scale:__sc,backgroundColor:"#f4f1ea",useCORS:true,logging:false}).then(function(canvas){
      var a=document.createElement("a");
      a.download=(S.name?S.name.replace(/[^a-z0-9]+/gi,"_")+"_":"")+"Leading_with_AI_Card.png";
      a.href=canvas.toDataURL("image/png"); a.click();
    }).catch(function(){ toast("Could not build the image. Use Save as PDF instead."); });
  }
  if(window.html2canvas) go();
  else { loadH2C(); var n=0,t=setInterval(function(){ n++;
      if(window.html2canvas){ clearInterval(t); go(); }
      else if(n>60){ clearInterval(t); toast("Image tool blocked. Use Save as PDF instead."); } },200); }
}
