<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Confident Educators &mdash; Find Your Persona</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        :root {
            --bg-deep: #0f1019;
            --bg-card: #181825;
            --bg-surface: #1e1e2e;
            --accent-gold: #D4A843;
            --accent-gold-light: #F0D68A;
            --text-primary: #e8e6e3;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            min-height: 100vh;
            min-height: 100dvh;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-primary);
        }

        body {
            background-image:
                radial-gradient(ellipse at 20% 0%, rgba(212, 168, 67, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(14, 165, 233, 0.03) 0%, transparent 50%);
        }

        .font-serif { font-family: 'DM Serif Display', serif; }

        .fade-up {
            animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0; transform: translateY(16px);
        }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        .stagger-1 { animation-delay: 0.08s; }
        .stagger-2 { animation-delay: 0.16s; }
        .stagger-3 { animation-delay: 0.24s; }
        .stagger-4 { animation-delay: 0.32s; }

        .option-btn {
            background: var(--bg-surface);
            border: 1.5px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 16px 20px 16px 48px;
            text-align: left;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
            color: var(--text-primary);
            font-size: 0.93rem;
            line-height: 1.5;
            position: relative;
            overflow: hidden;
            width: 100%;
        }
        .option-btn:hover {
            border-color: rgba(255,255,255,0.15);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }
        .option-btn:active { transform: translateY(0); }

        .option-badge {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 26px; height: 26px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 800;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.03);
            color: rgba(255,255,255,0.15);
            transition: all 0.25s;
        }

        .option-btn.pick-1 {
            border-color: var(--accent-gold);
            background: rgba(212,168,67,0.08);
        }
        .option-btn.pick-1 .option-badge {
            background: var(--accent-gold);
            border-color: var(--accent-gold);
            color: var(--bg-deep);
        }

        .option-btn.pick-2 {
            border-color: #60a5fa;
            background: rgba(96,165,250,0.06);
        }
        .option-btn.pick-2 .option-badge {
            background: #60a5fa;
            border-color: #60a5fa;
            color: var(--bg-deep);
        }

        .progress-track {
            width: 100%; height: 4px;
            background: rgba(255,255,255,0.06);
            border-radius: 2px; overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-gold-light));
            border-radius: 2px;
            transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .btn-primary {
            background: var(--accent-gold);
            color: var(--bg-deep);
            font-weight: 700;
            padding: 14px 32px;
            border-radius: 10px;
            border: none; cursor: pointer;
            font-size: 1rem;
            letter-spacing: 0.02em;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(212,168,67,0.25);
        }
        .btn-primary:hover {
            background: var(--accent-gold-light);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(212,168,67,0.35);
        }
        .btn-primary:disabled {
            opacity: 0.35; cursor: not-allowed;
            transform: none; box-shadow: none;
        }

        .processing-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--accent-gold);
            animation: pulse 1.4s ease-in-out infinite;
        }
        .processing-dot:nth-child(2) { animation-delay: 0.2s; }
        .processing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }

        .toast {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e1e2e; border: 1px solid rgba(212,168,67,0.3);
            color: var(--text-primary); padding: 12px 24px; border-radius: 10px;
            font-size: 0.85rem; z-index: 100;
            transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        @media (max-width: 640px) {
            .option-btn { padding: 14px 16px 14px 44px; font-size: 0.88rem; }
        }
    </style>
</head>

                    { text: "You ask Claude to help you design the experience. What parents should feel, do, and leave with. Build the slides around that.", persona: "tehtarik", p: "partner", confidence: 3 },
                    { text: "You build a small interactive parents can try with their child later that evening. A take-home artefact that does the talking for you.", persona: "icekacang", p: "partner", confidence: 3 }
                ]
            },
            {
                scenario: "You have drafted a lesson with Claude's help, but something feels off when you read it aloud.",
                question: "What do you do?",
                options: [
                    { text: "You shelve it. Use last year's lesson plan instead. Time is short.", persona: "durian", p: "prohibit", confidence: 1 },
                    { text: "You ask Claude what might be off, and to suggest three different ways to revise.", persona: "kopio", persona2: "zichar", p: "polish", confidence: 2 },
                    { text: "You read it aloud to a colleague at the next break. Fresh ears catch what you cannot.", persona: "tehtarik", p: "plan", confidence: 2 },
                    { text: "You go back to your original prompt. Realise you did not tell Claude enough about your class. Rebuild from there.", persona: "zichar", p: "partner", confidence: 3 }
                ]
            },
            {
                scenario: "A colleague asks how you made that lesson. You are using AI in ways she has not tried.",
                question: "How do you respond?",
                options: [
                    { text: "You play it down. Nothing fancy, you say. You will share the prompt later if she asks again.", persona: "kopio", p: "plan", confidence: 1 },
                    { text: "You walk her through what you did, step by step. Offer to sit with her while she tries it.", persona: "tehtarik", p: "partner", confidence: 3 },
                    { text: "You write up a short guide so she, and others, can try it on their own time.", persona: "tehtarik", persona2: "caifan", p: "produce", confidence: 3 },
                    { text: "You suggest you both bring it to the next level meeting. Design something together.", persona: "tehtarik", persona2: "zichar", p: "partner", confidence: 3 }
                ]
            },
            {
                scenario: "End of the term. You have used AI more this year than ever before.",
                question: "What is the next move?",
                options: [
                    { text: "Honestly, you are still figuring out if it is worth the effort. See how next term goes.", persona: "durian", p: "prohibit", confidence: 1 },
                    { text: "Get faster and sharper at the things you already do. Admin, comms, marking.", persona: "caifan", p: "produce", confidence: 2 },
                    { text: "Learn to build small tools and artefacts your students can actually use.", persona: "icekacang", p: "partner", confidence: 3 },
                    { text: "Use AI to think harder, not faster. About pedagogy. About your own practice.", persona: "zichar", persona2: "tehtarik", p: "partner", confidence: 3 }
                ]
            },
            {
                type: "reject",
                scenario: "Last one. A different kind of question.",
                question: "Which kind of work would you least want to do?",
                hint: "Pick what you would least want first. Then pick a second. The work you reject reveals as much as the work you would choose.",
                options: [
                    { text: "Building admin and comms templates that save you Sunday evenings.", persona: "caifan" },
                    { text: "Designing different learning pathways for different students in the same lesson.", persona: "rojak" },
                    { text: "Coaching colleagues and helping them improve their teaching.", persona: "tehtarik" },
                    { text: "Working through curriculum design and complex unit planning.", persona: "zichar" },
                    { text: "Building games, simulations, or interactives for students to use.", persona: "icekacang" },
                    { text: "Watching how others use AI before trying things yourself.", persona: "kopio" }
                ]
            }
        ];

        // ============================================================
        //  STATE
        // ============================================================
        const app = document.getElementById('app');
        let participantName = '';
        let participantSchool = '';
        let currentQ = 0;
        let answers = [];
        let pick1 = null;
        let pick2 = null;

        function showToast(msg, dur = 3000) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), dur);
        }

        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        const shuffledOrders = QUESTIONS.map(q => shuffle(q.options.map((_, i) => i)));

        // ============================================================
        //  WELCOME
        // ============================================================
        function renderWelcome() {
            app.innerHTML = `
                <div class="w-full max-w-lg text-center fade-up">
                    <div class="mb-10">
                        <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full border border-white/10 bg-white/[0.03] mb-6">
                            <span class="text-xs font-semibold tracking-widest uppercase" style="color:var(--accent-gold);">Pre-Workshop</span>
                        </div>
                        <h1 class="font-serif text-3xl sm:text-4xl leading-tight mb-3" style="color:var(--accent-gold-light);">AI Confident<br>Educators</h1>
                        <p class="text-sm tracking-widest uppercase font-semibold" style="color:var(--text-muted);">Find Your Persona</p>
                        <p class="text-xs tracking-wider uppercase mt-2" style="color:var(--text-muted);">${WORKSHOP_DATE_FULL}</p>
                    </div>
                    <div class="text-left bg-white/[0.02] border border-white/[0.06] rounded-2xl p-6 mb-8">
                        <p class="text-sm leading-relaxed" style="color:var(--text-secondary);">Before we meet, this short exercise will help us group you for the workshop. Ten teaching situations. For each, <strong style="color:var(--accent-gold);">pick two responses</strong>. Your first choice carries more weight than your second.</p>
                        <p class="text-sm leading-relaxed mt-3" style="color:var(--text-secondary);">There are no right answers. Pick what resonates most naturally with how you actually work.</p>
                    </div>
                    <div class="mb-4">
                        <label for="nameInput" class="block text-xs font-semibold tracking-wider uppercase mb-2" style="color:var(--text-muted);">Your name</label>
                        <input type="text" id="nameInput" maxlength="40" placeholder="e.g. Aishah" class="w-full px-5 py-4 rounded-xl text-center text-lg font-semibold outline-none transition-all" style="background:var(--bg-surface);border:1.5px solid rgba(255,255,255,0.08);color:var(--text-primary);" onfocus="this.style.borderColor='var(--accent-gold)'" onblur="this.style.borderColor='rgba(255,255,255,0.08)'">
                    </div>
                    <div class="mb-6">
                        <label for="schoolInput" class="block text-xs font-semibold tracking-wider uppercase mb-2" style="color:var(--text-muted);">Your school <span style="color:var(--text-muted);text-transform:none;letter-spacing:0;font-weight:500;">(optional)</span></label>
                        <input type="text" id="schoolInput" maxlength="80" placeholder="e.g. Springdale Primary" class="w-full px-5 py-4 rounded-xl text-center text-base font-medium outline-none transition-all" style="background:var(--bg-surface);border:1.5px solid rgba(255,255,255,0.08);color:var(--text-primary);" onfocus="this.style.borderColor='var(--accent-gold)'" onblur="this.style.borderColor='rgba(255,255,255,0.08)'">
                    </div>
                    <button id="startBtn" class="btn-primary w-full text-base" disabled>Begin</button>
                    <p class="text-xs mt-6" style="color:var(--text-muted);">About 4 minutes &middot; 10 situations</p>
                </div>`;
            const inp = document.getElementById('nameInput');
            const sch = document.getElementById('schoolInput');
            const btn = document.getElementById('startBtn');
            const checkReady = () => { btn.disabled = inp.value.trim().length < 1; };
            inp.addEventListener('input', checkReady);
            inp.addEventListener('keydown', e => { if (e.key === 'Enter' && inp.value.trim().length >= 1) startSurvey(); });
            sch.addEventListener('keydown', e => { if (e.key === 'Enter' && inp.value.trim().length >= 1) startSurvey(); });
            btn.addEventListener('click', startSurvey);
        }

        function startSurvey() {
            participantName = document.getElementById('nameInput').value.trim();
            participantSchool = document.getElementById('schoolInput').value.trim();
            currentQ = 0; answers = [];
            renderQuestion();
        }

        // ============================================================
        //  QUESTION
        // ============================================================
        function renderQuestion() {
            pick1 = null; pick2 = null;
            const q = QUESTIONS[currentQ];
            const order = shuffledOrders[currentQ];
            // Progress: count current question as in-progress (so Q1 shows 10%, Q10 shows 100%)
            const pct = ((currentQ + 1) / QUESTIONS.length) * 100;
            const isReject = q.type === 'reject';

            // Hint copy varies for reject question
            const hintHtml = isReject
                ? `<p class="text-xs mb-5" style="color:var(--text-muted);">Pick the work you would <span style="color:var(--accent-gold);font-weight:600;">least want to do</span> first. Then pick a <span style="color:#60a5fa;font-weight:600;">second</span>. Tap again to deselect.</p>`
                : `<p class="text-xs mb-5" style="color:var(--text-muted);">Select two. <span style="color:var(--accent-gold);font-weight:600;">First choice</span> carries more weight than your <span style="color:#60a5fa;font-weight:600;">second</span>. Tap again to deselect.</p>`;

            app.innerHTML = `
                <div class="w-full max-w-lg fade-up">
                    <div class="mb-6">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xs font-semibold tracking-widest uppercase" style="color:var(--text-muted);">Situation ${currentQ+1} of ${QUESTIONS.length}</span>
                            <span class="text-xs font-medium" style="color:var(--accent-gold);">${Math.round(pct)}%</span>
                        </div>
                        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
                    </div>
                    <div class="mb-4 p-4 rounded-xl" style="background:rgba(212,168,67,0.04);border:1px solid rgba(212,168,67,0.08);">
                        <p class="text-sm leading-relaxed font-serif italic" style="color:var(--text-secondary);">${q.scenario}</p>
                    </div>
                    <h2 class="text-lg sm:text-xl font-bold mb-2 leading-snug" style="color:var(--text-primary);">${q.question}</h2>
                    ${hintHtml}
                    <div class="space-y-3" id="opts">
                        ${order.map((oi, di) => `<button class="option-btn fade-up stagger-${di+1}" data-orig="${oi}"><span class="option-badge"></span>${q.options[oi].text}</button>`).join('')}
                    </div>
                    <div class="mt-6"><button id="nextQBtn" class="btn-primary w-full" disabled>${currentQ === QUESTIONS.length - 1 ? 'See your result' : 'Next'}</button></div>
                </div>`;
            document.querySelectorAll('.option-btn').forEach(b => b.addEventListener('click', () => handleClick(parseInt(b.dataset.orig))));
            document.getElementById('nextQBtn').addEventListener('click', advance);
        }

        function handleClick(idx) {
            if (pick1 === idx) { pick1 = pick2 !== null ? pick2 : null; pick2 = null; }
            else if (pick2 === idx) { pick2 = null; }
            else if (pick1 === null) { pick1 = idx; }
            else if (pick2 === null) { pick2 = idx; }
            else { showToast('Deselect an option first.'); return; }
            updateStyles();
        }

        function updateStyles() {
            document.querySelectorAll('.option-btn').forEach(b => {
                const o = parseInt(b.dataset.orig);
                const badge = b.querySelector('.option-badge');
                b.classList.remove('pick-1','pick-2');
                badge.textContent = '';
                if (o === pick1) { b.classList.add('pick-1'); badge.textContent = '1'; }
                else if (o === pick2) { b.classList.add('pick-2'); badge.textContent = '2'; }
            });
            document.getElementById('nextQBtn').disabled = (pick1 === null || pick2 === null);
        }

        function advance() {
            answers.push({ first: pick1, second: pick2 });
            currentQ++;
            currentQ >= QUESTIONS.length ? renderProcessing() : renderQuestion();
        }

        // ============================================================
        //  PROCESSING
        // ============================================================
        function renderProcessing() {
            app.innerHTML = `<div class="text-center fade-up"><div class="flex justify-center gap-3 mb-8"><div class="processing-dot"></div><div class="processing-dot"></div><div class="processing-dot"></div></div><p class="font-serif text-xl mb-2" style="color:var(--accent-gold-light);">Reading your responses\u2026</p><p class="text-sm" style="color:var(--text-muted);">Mapping persona, stance, and where you lean.</p></div>`;
            setTimeout(() => { const r = calculateResults(); sendToSheets(r); renderResults(r); }, 2200);
        }

        // ============================================================
        //  SCORING
        // ============================================================
        function calculateResults() {
            const personaScores = { caifan:0, rojak:0, tehtarik:0, zichar:0, icekacang:0, kopio:0 };
            const pScores = { prohibit:0, plan:0, polish:0, produce:0, partner:0 };
            let durianCount = 0;
            let confidenceSum = 0;
            let rejectedPrimary = null;
            let rejectedSecondary = null;

            answers.forEach((a, qi) => {
                const q = QUESTIONS[qi];
                const f = q.options[a.first];
                const s = q.options[a.second];

                // ---- Reject-type question: subtract from rejected personas ----
                if (q.type === 'reject') {
                    rejectedPrimary = f.persona;
                    rejectedSecondary = s.persona;
                    if (f.persona && personaScores[f.persona] !== undefined) {
                        personaScores[f.persona] -= 4;
                    }
                    if (s.persona && personaScores[s.persona] !== undefined) {
                        personaScores[s.persona] -= 2;
                    }
                    return; // no p-score, confidence, or durian effect
                }

                // ---- Standard question: weighted scoring ----
                // First choice: 3 points primary, 1.5 secondary
                if (f.persona && f.persona !== 'durian') {
                    personaScores[f.persona] += 3;
                    if (f.persona2) personaScores[f.persona2] += 1.5;
                }
                if (f.persona === 'durian') durianCount++;
                pScores[f.p] += 3;
                confidenceSum += f.confidence;

                // Second choice: 2 points primary, 1 secondary
                if (s.persona && s.persona !== 'durian') {
                    personaScores[s.persona] += 2;
                    if (s.persona2) personaScores[s.persona2] += 1;
                }
                pScores[s.p] += 2;
            });

            const ranked = Object.entries(personaScores).sort((a, b) => b[1] - a[1]);
            let primaryKey, adjacentKey;

            // Durian threshold lowered from 4 to 3
            if (durianCount >= 3) {
                primaryKey = 'durian';
            } else if (confidenceSum < 12) {
                primaryKey = 'kopio';
            } else {
                primaryKey = ranked[0][0];
            }

            // Hardcoded adjacency from PERSONAS.adjacentKey — guarantees bridge text fits
            adjacentKey = PERSONAS[primaryKey].adjacentKey;

            const pRanked = Object.entries(pScores).sort((a, b) => b[1] - a[1]);
            const topP = pRanked.slice(0, 2).map(([k]) => k);
            const lowP = pRanked[pRanked.length - 1][0];

            // Confidence sum max is now 27 (9 standard questions × 3 max). Bands adjusted.
            let confidenceLabel;
            if (confidenceSum < 10) confidenceLabel = 'building';
            else if (confidenceSum <= 18) confidenceLabel = 'steady';
            else confidenceLabel = 'fluent';

            return {
                primaryKey, adjacentKey,
                personaScores, pScores,
                topP, lowP,
                confidenceLabel, confidenceSum,
                durianCount,
                rejectedPrimary, rejectedSecondary,
                rankedPersonas: ranked
            };
        }

        // ============================================================
        //  SHEETS
        // ============================================================
        function sendToSheets(r) {
            if (!SHEETS_URL || SHEETS_URL.startsWith('PASTE_')) {
                console.warn('[Sheets] No URL configured; skipping log.');
                return;
            }
            const personaBreakdown = r.rankedPersonas.map(([k,v]) => PERSONAS[k].short + ': ' + v.toFixed(1)).join(', ');
            const pBreakdown = Object.entries(r.pScores).map(([k,v]) => k + ': ' + v.toFixed(1)).join(', ');
            const payload = {
                timestamp: new Date().toISOString(),
                name: participantName,
                school: participantSchool || '',
                primaryPersona: PERSONAS[r.primaryKey].name,
                adjacentPersona: PERSONAS[r.adjacentKey].name,
                durianCount: r.durianCount,
                confidenceSum: r.confidenceSum,
                confidenceLabel: r.confidenceLabel,
                topP: r.topP.join(' / '),
                lowP: r.lowP,
                personaScores: personaBreakdown,
                pScores: pBreakdown,
                rejectedPrimary: r.rejectedPrimary && PERSONAS[r.rejectedPrimary] ? PERSONAS[r.rejectedPrimary].name : '',
                rejectedSecondary: r.rejectedSecondary && PERSONAS[r.rejectedSecondary] ? PERSONAS[r.rejectedSecondary].name : ''
            };
            fetch(SHEETS_URL, {
                method:'POST',
                mode:'no-cors',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify(payload)
            }).catch(e => console.warn('[Sheets]', e));
        }

        // ============================================================
        //  P-LEAN COPY
        // ============================================================
        const P_LABELS = {
            prohibit: 'Prohibit',
            plan: 'Plan',
            polish: 'Polish',
            produce: 'Produce',
            partner: 'Partner'
        };

        function leanSentence(topP, lowP) {
            const top1 = P_LABELS[topP[0]];
            const top2 = P_LABELS[topP[1]];
            const low = P_LABELS[lowP];
            return `Your responses lean toward <strong>${top1}</strong> and <strong>${top2}</strong>. You're less drawn to <strong>${low}</strong>.`;
        }

        function confidenceSentence(label) {
            if (label === 'building') return 'Your confidence with AI is still building. The workshop will start with the basics and move at a pace you set.';
            if (label === 'steady') return 'Your confidence with AI is steady. The workshop will build on what you already know and push you a little further.';
            return 'Your confidence with AI is fluent. The workshop will push you toward harder uses and longer-form work.';
        }

        // ============================================================
        //  RESULT CARD
        // ============================================================
        function renderResults(r) {
            const pri = PERSONAS[r.primaryKey];
            const adj = PERSONAS[r.adjacentKey];
            const C = { gold:'#D4A843', goldL:'#F0D68A', tP:'#e8e6e3', tS:'#9ca3af', tM:'#6b7280', bgD:'#0f1019', div:'rgba(255,255,255,0.06)' };

            // Adjacent block — small sub-section
            const adjacentHTML = `<div style="display:flex;align-items:flex-start;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid ${C.div};"><span style="color:${adj.color};margin-top:1px;flex-shrink:0;">${ICONS[r.adjacentKey]}</span><div><p style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:${C.tM};margin-bottom:2px;">Your adjacent group</p><p style="font-size:13px;font-weight:700;color:${adj.color};margin-bottom:4px;">${adj.short}</p><p style="font-size:11px;line-height:1.55;color:${C.tS};">${pri.bridge}</p></div></div>`;

            // 5P lean bars
            const pMx = Math.max(...Object.values(r.pScores)) || 1;
            const pBars = ['prohibit','plan','polish','produce','partner'].map(k => {
                const v = r.pScores[k];
                const pct = (v / pMx) * 100;
                const isTop = r.topP.includes(k);
                const colour = isTop ? C.gold : 'rgba(255,255,255,0.35)';
                return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;"><span style="font-size:9px;font-weight:700;width:60px;text-align:right;color:${isTop ? C.gold : C.tM};text-transform:uppercase;letter-spacing:0.05em;">${P_LABELS[k]}</span><div style="flex:1;height:5px;border-radius:9999px;background:rgba(255,255,255,0.04);"><div style="height:100%;border-radius:9999px;width:${pct}%;background:${colour};${v>0?'min-width:3px;':''}"></div></div></div>`;
            }).join('');

            const d = `<div style="height:1px;background:${C.div};margin:0 20px;"></div>`;
            const s = (c, x = '') => `<div style="padding:16px 20px;${x}">${c}</div>`;

            const card = `
<div style="height:4px;background:linear-gradient(90deg,${pri.color},transparent);"></div>
${s(`<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;"><div><p style="font-size:10px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:${C.gold};">AI Confident Educators</p><p style="font-size:9px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;margin-top:2px;color:${C.tM};display:flex;align-items:center;gap:5px;"><span style="display:inline-flex;color:${C.tM};">${ICON_DATE}</span>${WORKSHOP_DATE_FULL}</p></div><div><span style="font-size:9px;font-weight:600;padding:4px 8px;border-radius:4px;background:${pri.colorLight};color:${pri.color};white-space:nowrap;">Your Persona</span></div></div>`, 'padding-bottom:8px;')}
${d}
${s(`<p style="font-size:16px;font-weight:700;margin-bottom:4px;color:${C.tP};">Hi, ${participantName}!</p><p style="font-size:11px;line-height:1.6;margin-bottom:16px;color:${C.tS};">From ten teaching situations, here is what we found.</p><div style="border-radius:12px;padding:16px;background:${pri.colorLight};border:1px solid ${pri.color}33;"><p style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;color:${C.tM};">You are a</p><div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;"><span style="color:${pri.color};display:inline-flex;">${ICONS_LG[r.primaryKey]}</span><span style="font-size:22px;font-weight:700;color:${pri.color};line-height:1.1;">${pri.name}</span></div><p style="font-size:11.5px;line-height:1.6;color:${C.tS};">${pri.description}</p>${adjacentHTML}</div>`)}
${d}
${s(`<p style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px;color:${C.tM};">Your 5P lean</p><div style="margin-bottom:12px;">${pBars}</div><p style="font-size:11px;line-height:1.6;color:${C.tS};margin-bottom:6px;">${leanSentence(r.topP, r.lowP)}</p><p style="font-size:11px;line-height:1.6;color:${C.tS};">${confidenceSentence(r.confidenceLabel)}</p>`)}
${d}

        function downloadCard() {
            const card = document.getElementById('result-card-render');
            const btn = document.getElementById('downloadBtn');
            btn.textContent = 'Generating\u2026'; btn.disabled = true;

            html2canvas(card, { backgroundColor:'#13131f', scale:2, useCORS:true, logging:false, allowTaint:true, width:card.offsetWidth, height:card.offsetHeight, scrollX:0, scrollY:-window.scrollY }).then(canvas => {
                const url = canvas.toDataURL('image/png');
                const safe = participantName.replace(/[^a-zA-Z0-9]/g,'-');
                if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
                    const w = window.open('');
                    if (w) { w.document.write('<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Your Card</title><style>body{margin:0;padding:16px;background:#0f1019;display:flex;flex-direction:column;align-items:center;font-family:sans-serif;}img{max-width:100%;height:auto;border-radius:12px;}p{color:#9ca3af;font-size:14px;margin-top:16px;text-align:center;}</style></head><body><p>Long-press the image to save it.</p><img src="'+url+'" alt="Card"></body></html>'); w.document.close(); }
                    else { dl(url, safe); }
                } else { dl(url, safe); }
                btn.textContent = 'Download Card \u2B07'; btn.disabled = false;
                showToast('Card generated!');
            }).catch(e => { console.error(e); btn.textContent = 'Failed \u2014 Try Again'; btn.disabled = false; });
        }

        function dl(url, name) {
            const a = document.createElement('a');
            a.download = 'AI-Confident-' + name + '.png';
            a.href = url;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }
