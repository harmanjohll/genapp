<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Confident Educators &mdash; Find Your Persona</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        :root {
            --bg-deep: #0f1019;
            --bg-card: #181825;
            --bg-surface: #1e1e2e;
            --accent-gold: #D4A843;
            --accent-gold-light: #F0D68A;
            --text-primary: #e8e6e3;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            min-height: 100vh;
            min-height: 100dvh;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-primary);
        }

        body {
            background-image:
                radial-gradient(ellipse at 20% 0%, rgba(212, 168, 67, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(14, 165, 233, 0.03) 0%, transparent 50%);
        }

        .font-serif { font-family: 'DM Serif Display', serif; }

        .fade-up {
            animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0; transform: translateY(16px);
        }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        .stagger-1 { animation-delay: 0.08s; }
        .stagger-2 { animation-delay: 0.16s; }
        .stagger-3 { animation-delay: 0.24s; }
        .stagger-4 { animation-delay: 0.32s; }
        .stagger-5 { animation-delay: 0.40s; }
        .stagger-6 { animation-delay: 0.48s; }

        .option-btn {
            background: var(--bg-surface);
            border: 1.5px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 16px 20px 16px 48px;
            text-align: left;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
            color: var(--text-primary);
            font-size: 0.93rem;
            line-height: 1.5;
            position: relative;
            overflow: hidden;
            width: 100%;
        }
        .option-btn:hover {
            border-color: rgba(255,255,255,0.15);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }
        .option-btn:active { transform: translateY(0); }

        .option-badge {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 26px; height: 26px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 800;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.03);
            color: rgba(255,255,255,0.15);
            transition: all 0.25s;
        }

        .option-btn.pick-1 {
            border-color: var(--accent-gold);
            background: rgba(212,168,67,0.08);
        }
        .option-btn.pick-1 .option-badge {
            background: var(--accent-gold);
            border-color: var(--accent-gold);
            color: var(--bg-deep);
        }

        .option-btn.pick-2 {
            border-color: #60a5fa;
            background: rgba(96,165,250,0.06);
        }
        .option-btn.pick-2 .option-badge {
            background: #60a5fa;
            border-color: #60a5fa;
            color: var(--bg-deep);
        }

        .progress-track {
            width: 100%; height: 4px;
            background: rgba(255,255,255,0.06);
            border-radius: 2px; overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-gold-light));
            border-radius: 2px;
            transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .btn-primary {
            background: var(--accent-gold);
            color: var(--bg-deep);
            font-weight: 700;
            padding: 14px 32px;
            border-radius: 10px;
            border: none; cursor: pointer;
            font-size: 1rem;
            letter-spacing: 0.02em;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(212,168,67,0.25);
        }
        .btn-primary:hover {
            background: var(--accent-gold-light);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(212,168,67,0.35);
        }
        .btn-primary:disabled {
            opacity: 0.35; cursor: not-allowed;
            transform: none; box-shadow: none;
        }

        .processing-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--accent-gold);
            animation: pulse 1.4s ease-in-out infinite;
        }
        .processing-dot:nth-child(2) { animation-delay: 0.2s; }
        .processing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }

        .toast {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e1e2e; border: 1px solid rgba(212,168,67,0.3);
            color: var(--text-primary); padding: 12px 24px; border-radius: 10px;
            font-size: 0.85rem; z-index: 100;
            transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        @media (max-width: 640px) {
            .option-btn { padding: 14px 16px 14px 44px; font-size: 0.88rem; }
        }

        @media (prefers-reduced-motion: reduce) {
            .fade-up { animation: none; opacity: 1; transform: none; }
            .processing-dot { animation: none; opacity: 0.7; }
            .progress-fill, .option-btn, .btn-primary, .toast { transition: none; }
        }
    </style>
</head>

            const isLast = currentQ === QUESTIONS.length - 1;
            const backBtn = currentQ > 0
                ? `<button id="backQBtn" type="button" class="px-5 py-3 rounded-xl text-sm font-semibold transition-all" style="background:transparent;border:1.5px solid rgba(255,255,255,0.10);color:var(--text-secondary);">Back</button>`
                : '';

            app.innerHTML = `
                <div class="w-full max-w-lg fade-up">
                    <div class="mb-6">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xs font-semibold tracking-widest uppercase" style="color:var(--text-muted);">Situation ${currentQ+1} of ${QUESTIONS.length}</span>
                            <span class="text-xs font-medium" style="color:var(--accent-gold);">${Math.round(pct)}%</span>
                        </div>
                        <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="${Math.round(pct)}"><div class="progress-fill" style="width:${pct}%"></div></div>
                    </div>
                    <div class="mb-4 p-4 rounded-xl" style="background:rgba(212,168,67,0.04);border:1px solid rgba(212,168,67,0.08);">
                        <p class="text-sm leading-relaxed font-serif italic" style="color:var(--text-secondary);">${q.scenario}</p>
                    </div>
                    <h2 class="text-lg sm:text-xl font-bold mb-2 leading-snug" style="color:var(--text-primary);">${q.question}</h2>
                    ${hintHtml}
                    <div class="space-y-3" id="opts">
                        ${order.map((oi, di) => `<button type="button" class="option-btn fade-up stagger-${Math.min(di+1, 6)}" data-orig="${oi}" aria-pressed="false"><span class="option-badge" aria-hidden="true"></span>${q.options[oi].text}</button>`).join('')}
                    </div>
                    <div class="mt-6 flex gap-3">
                        ${backBtn}
                        <button id="nextQBtn" class="btn-primary flex-1" disabled>${isLast ? 'See your result' : 'Next'}</button>
                    </div>
                    <div class="mt-4 text-center">
                        <button id="restartBtn" type="button" style="font-size:11px;color:var(--text-muted);background:transparent;border:none;cursor:pointer;padding:4px 8px;text-decoration:underline;text-decoration-color:rgba(255,255,255,0.15);text-underline-offset:3px;">Start over</button>
                    </div>
                </div>`;
            document.querySelectorAll('.option-btn').forEach(b => b.addEventListener('click', () => handleClick(parseInt(b.dataset.orig))));
            document.getElementById('nextQBtn').addEventListener('click', advance);
            const back = document.getElementById('backQBtn');
            if (back) back.addEventListener('click', goBack);
            document.getElementById('restartBtn').addEventListener('click', () => {
                if (confirm('Start over? Your current answers will be cleared.')) restartSurvey();
            });
            updateStyles();
        }

        function handleClick(idx) {
            if (pick1 === idx) { pick1 = pick2 !== null ? pick2 : null; pick2 = null; }
            else if (pick2 === idx) { pick2 = null; }
            else if (pick1 === null) { pick1 = idx; }
            else if (pick2 === null) { pick2 = idx; }
            else { showToast('Deselect an option first.'); return; }
            updateStyles();
        }

        function updateStyles() {
            document.querySelectorAll('.option-btn').forEach(b => {
                const o = parseInt(b.dataset.orig);
                const badge = b.querySelector('.option-badge');
                b.classList.remove('pick-1','pick-2');
                badge.textContent = '';
                b.setAttribute('aria-pressed', 'false');
                if (o === pick1) { b.classList.add('pick-1'); badge.textContent = '1'; b.setAttribute('aria-pressed', 'true'); }
                else if (o === pick2) { b.classList.add('pick-2'); badge.textContent = '2'; b.setAttribute('aria-pressed', 'true'); }
            });
            document.getElementById('nextQBtn').disabled = (pick1 === null || pick2 === null);
        }

        function advance() {
            answers[currentQ] = { first: pick1, second: pick2 };
            currentQ++;
            saveState();
            currentQ >= QUESTIONS.length ? renderProcessing() : renderQuestion();
        }

        function goBack() {
            if (currentQ === 0) return;
            // Persist any complete selection on the current question before navigating.
            if (pick1 !== null && pick2 !== null) {
                answers[currentQ] = { first: pick1, second: pick2 };
            }
            currentQ--;
            saveState();
            renderQuestion();
        }

        // ============================================================
        //  PROCESSING
        // ============================================================
        function renderProcessing() {
            app.innerHTML = `<div class="text-center fade-up"><div class="flex justify-center gap-3 mb-8"><div class="processing-dot"></div><div class="processing-dot"></div><div class="processing-dot"></div></div><p class="font-serif text-xl mb-2" style="color:var(--accent-gold-light);">Reading your responses\u2026</p><p class="text-sm" style="color:var(--text-muted);">Mapping persona, stance, and where you lean.</p></div>`;
            setTimeout(() => { const r = calculateResults(); sendToSheets(r); renderResults(r); }, 2200);
        }

        // ============================================================
        //  SCORING
        // ============================================================
        function calculateResults() {
            const personaScores = { caifan:0, rojak:0, tehtarik:0, zichar:0, icekacang:0, kopio:0 };
            const pScores = { prohibit:0, plan:0, polish:0, produce:0, partner:0 };
            let durianCount = 0;
            let confidenceSum = 0;
            let rejectedPrimary = null;
            let rejectedSecondary = null;

            answers.forEach((a, qi) => {
                const q = QUESTIONS[qi];
                const f = q.options[a.first];
                const s = q.options[a.second];

                // ---- Reject-type question: subtract from rejected personas ----
                if (q.type === 'reject') {
                    rejectedPrimary = f.persona;
                    rejectedSecondary = s.persona;
                    if (f.persona && personaScores[f.persona] !== undefined) {
                        personaScores[f.persona] -= 4;
                    }
                    if (s.persona && personaScores[s.persona] !== undefined) {
                        personaScores[s.persona] -= 2;
                    }
                    return; // no p-score, confidence, or durian effect
                }

                // ---- Standard question: weighted scoring ----
                // First choice: 3 points primary, 1.5 secondary
                if (f.persona && f.persona !== 'durian') {
                    personaScores[f.persona] += 3;
                    if (f.persona2) personaScores[f.persona2] += 1.5;
                }
                if (f.persona === 'durian') durianCount++;
                pScores[f.p] += 3;
                confidenceSum += f.confidence;

                // Second choice: 2 points primary, 1 secondary
                if (s.persona && s.persona !== 'durian') {
                    personaScores[s.persona] += 2;
                    if (s.persona2) personaScores[s.persona2] += 1;
                }
                pScores[s.p] += 2;
            });

            const ranked = Object.entries(personaScores).sort((a, b) => b[1] - a[1]);
            let primaryKey, adjacentKey;
            let placedByConfidence = false;

            // Durian threshold lowered from 4 to 3
            if (durianCount >= 3) {
                primaryKey = 'durian';
            } else if (confidenceSum < 12) {
                primaryKey = 'kopio';
                placedByConfidence = ranked[0][0] !== 'kopio';
            } else {
                primaryKey = ranked[0][0];
            }

            // Hardcoded adjacency from PERSONAS.adjacentKey — guarantees bridge text fits
            adjacentKey = PERSONAS[primaryKey].adjacentKey;

            // Normalise pScores by how often each stance appears in the bank.
            // Without this, partner (13 options) outweighs polish (2 options) regardless of intent.
            const pAvg = {};
            Object.keys(pScores).forEach(k => {
                pAvg[k] = P_COUNTS[k] > 0 ? pScores[k] / P_COUNTS[k] : 0;
            });
            const pRanked = Object.entries(pAvg).sort((a, b) => b[1] - a[1]);
            const topP = pRanked.slice(0, 2).map(([k]) => k);
            const lowP = pRanked[pRanked.length - 1][0];

            // Confidence sum max is now 27 (9 standard questions × 3 max). Bands adjusted.
            let confidenceLabel;
            if (confidenceSum < 10) confidenceLabel = 'building';
            else if (confidenceSum <= 18) confidenceLabel = 'steady';
            else confidenceLabel = 'fluent';

            return {
                primaryKey, adjacentKey,
                personaScores, pScores, pAvg,
                topP, lowP,
                confidenceLabel, confidenceSum,
                durianCount,
                rejectedPrimary, rejectedSecondary,
                rankedPersonas: ranked,
                placedByConfidence
            };
        }

        // ============================================================
        //  SHEETS
        // ============================================================
        function sendToSheets(r) {
            if (!SHEETS_URL || SHEETS_URL.startsWith('PASTE_')) {
                console.warn('[Sheets] No URL configured; skipping log.');
                return;
            }
            // Avoid re-submitting on a same-session refresh of the result page.
            try {
                if (sessionStorage.getItem(SHEETS_SENT_KEY) === '1') return;
                sessionStorage.setItem(SHEETS_SENT_KEY, '1');
            } catch (e) { /* sessionStorage unavailable; submit anyway */ }
            const personaBreakdown = r.rankedPersonas.map(([k,v]) => PERSONAS[k].short + ': ' + v.toFixed(1)).join(', ');
            const pBreakdown = Object.entries(r.pScores).map(([k,v]) => k + ': ' + v.toFixed(1)).join(', ');
            const payload = {
                timestamp: new Date().toISOString(),
                name: participantName,
                school: participantSchool || '',
                primaryPersona: PERSONAS[r.primaryKey].name,
                adjacentPersona: PERSONAS[r.adjacentKey].name,
                durianCount: r.durianCount,
                confidenceSum: r.confidenceSum,
                confidenceLabel: r.confidenceLabel,
                topP: r.topP.join(' / '),
                lowP: r.lowP,
                personaScores: personaBreakdown,
                pScores: pBreakdown,
                rejectedPrimary: r.rejectedPrimary && PERSONAS[r.rejectedPrimary] ? PERSONAS[r.rejectedPrimary].name : '',
                rejectedSecondary: r.rejectedSecondary && PERSONAS[r.rejectedSecondary] ? PERSONAS[r.rejectedSecondary].name : ''
            };
            fetch(SHEETS_URL, {
                method:'POST',
                mode:'no-cors',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify(payload)
            }).catch(e => console.warn('[Sheets]', e));
        }

        // ============================================================
        //  P-LEAN COPY
        // ============================================================
        const P_LABELS = {
            prohibit: 'Prohibit',
            plan: 'Plan',
            polish: 'Polish',
            produce: 'Produce',
            partner: 'Partner'
        };

        function leanSentence(topP, lowP) {
            const top1 = P_LABELS[topP[0]];
            const top2 = P_LABELS[topP[1]];
            const low = P_LABELS[lowP];
            return `Your responses lean toward <strong>${top1}</strong> and <strong>${top2}</strong>. You're less drawn to <strong>${low}</strong>.`;
        }

        function confidenceSentence(label) {
            if (label === 'building') return 'Your confidence with AI is still building. The workshop will start with the basics and move at a pace you set.';
            if (label === 'steady') return 'Your confidence with AI is steady. The workshop will build on what you already know and push you a little further.';
            return 'Your confidence with AI is fluent. The workshop will push you toward harder uses and longer-form work.';
        }

        // ============================================================
        //  RESULT CARD
        // ============================================================
        function renderResults(r) {
            // The quiz is complete; drop the in-progress save so a refresh shows the welcome screen.
            clearState();
            const pri = PERSONAS[r.primaryKey];
            const adj = PERSONAS[r.adjacentKey];
            const C = { gold:'#D4A843', goldL:'#F0D68A', tP:'#e8e6e3', tS:'#9ca3af', tM:'#6b7280', bgD:'#0f1019', div:'rgba(255,255,255,0.06)' };

            // Adjacent block — small sub-section
            const adjacentHTML = `<div style="display:flex;align-items:flex-start;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid ${C.div};"><span style="color:${adj.color};margin-top:1px;flex-shrink:0;">${ICONS[r.adjacentKey]}</span><div><p style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:${C.tM};margin-bottom:2px;">Your adjacent group</p><p style="font-size:13px;font-weight:700;color:${adj.color};margin-bottom:4px;">${adj.short}</p><p style="font-size:11px;line-height:1.55;color:${C.tS};">${pri.bridge}</p></div></div>`;

            // Transparency note when the kopi-O override placed the user here
            // even though their persona scores leant elsewhere.
            let placedByConfidenceHTML = '';
            if (r.placedByConfidence && r.rankedPersonas && r.rankedPersonas.length) {
                const topScorerKey = r.rankedPersonas[0][0];
                const topScorer = PERSONAS[topScorerKey];
                const lean = topScorer && topScorerKey !== 'kopio' ? `, though your answers also leant toward the <strong>${topScorer.short}</strong>` : '';
                placedByConfidenceHTML = `<p style="font-size:10.5px;line-height:1.55;margin-top:10px;padding:8px 10px;border-radius:8px;background:rgba(255,255,255,0.03);color:${C.tM};font-style:italic;">We started you here because confidence with AI is still building${lean}. The workshop will meet you where you are.</p>`;
            }

            // 5P lean bars — driven by pAvg (points per opportunity) so under-represented
            // stances like Polish are not structurally penalised.
            const pMx = Math.max(...Object.values(r.pAvg)) || 1;
            const pBars = ['prohibit','plan','polish','produce','partner'].map(k => {
                const v = r.pAvg[k];
                const pct = (v / pMx) * 100;
                const isTop = r.topP.includes(k);
                const colour = isTop ? C.gold : 'rgba(255,255,255,0.35)';
                return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;"><span style="font-size:9px;font-weight:700;width:60px;text-align:right;color:${isTop ? C.gold : C.tM};text-transform:uppercase;letter-spacing:0.05em;">${P_LABELS[k]}</span><div style="flex:1;height:5px;border-radius:9999px;background:rgba(255,255,255,0.04);"><div style="height:100%;border-radius:9999px;width:${pct}%;background:${colour};${v>0?'min-width:3px;':''}"></div></div></div>`;
            }).join('');

            const d = `<div style="height:1px;background:${C.div};margin:0 20px;"></div>`;
            const s = (c, x = '') => `<div style="padding:16px 20px;${x}">${c}</div>`;

            const card = `
<div style="height:4px;background:linear-gradient(90deg,${pri.color},transparent);"></div>
${s(`<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;"><div><p style="font-size:10px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:${C.gold};">AI Confident Educators</p><p style="font-size:9px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;margin-top:2px;color:${C.tM};display:flex;align-items:center;gap:5px;"><span style="display:inline-flex;color:${C.tM};">${ICON_DATE}</span>${WORKSHOP_DATE_FULL}</p></div><div><span style="font-size:9px;font-weight:600;padding:4px 8px;border-radius:4px;background:${pri.colorLight};color:${pri.color};white-space:nowrap;">Your Persona</span></div></div>`, 'padding-bottom:8px;')}
${d}
${s(`<p style="font-size:16px;font-weight:700;margin-bottom:4px;color:${C.tP};">Hi, ${participantName}!</p><p style="font-size:11px;line-height:1.6;margin-bottom:16px;color:${C.tS};">From ten teaching situations, here is what we found.</p><div style="border-radius:12px;padding:16px;background:${pri.colorLight};border:1px solid ${pri.color}33;"><p style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;color:${C.tM};">You are a</p><div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;"><span style="color:${pri.color};display:inline-flex;">${ICONS_LG[r.primaryKey]}</span><span style="font-size:22px;font-weight:700;color:${pri.color};line-height:1.1;">${pri.name}</span></div><p style="font-size:11.5px;line-height:1.6;color:${C.tS};">${pri.description}</p>${placedByConfidenceHTML}${adjacentHTML}</div>`)}
${d}
${s(`<p style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px;color:${C.tM};">Your 5P lean</p><div style="margin-bottom:12px;">${pBars}</div><p style="font-size:11px;line-height:1.6;color:${C.tS};margin-bottom:6px;">${leanSentence(r.topP, r.lowP)}</p><p style="font-size:11px;line-height:1.6;color:${C.tS};">${confidenceSentence(r.confidenceLabel)}</p>`)}
${d}
${s(`<div style="border-radius:12px;padding:14px;background:rgba(212,168,67,0.06);border:1px solid rgba(212,168,67,0.15);"><div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:14px;"><span style="color:${C.gold};margin-top:1px;flex-shrink:0;">${ICON_BRING}</span><div style="flex:1;"><p style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:${C.gold};margin-bottom:4px;">Bring</p><p style="font-size:11.5px;line-height:1.6;color:${C.tS};">${pri.bring}</p></div></div><div style="display:flex;align-items:flex-start;gap:10px;"><span style="color:${C.gold};margin-top:1px;flex-shrink:0;">${ICON_TRY}</span><div style="flex:1;"><p style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:${C.gold};margin-bottom:4px;">We will try to</p><p style="font-size:11.5px;line-height:1.6;color:${C.tS};">${pri.tryBuild}</p></div></div></div>`)}
${d}
${s(`<p style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;color:${C.tM};">Set up these three accounts</p><div style="display:flex;flex-direction:column;gap:6px;font-size:10.5px;line-height:1.5;color:${C.tS};"><div style="display:flex;gap:8px;"><span style="color:${C.gold};font-weight:700;width:14px;flex-shrink:0;">1.</span><span><strong style="color:${C.tP};">Claude</strong> &mdash; claude.ai. Free tier is enough.</span></div><div style="display:flex;gap:8px;"><span style="color:${C.gold};font-weight:700;width:14px;flex-shrink:0;">2.</span><span><strong style="color:${C.tP};">GitHub</strong> &mdash; github.com. Free, browser-based.</span></div><div style="display:flex;gap:8px;"><span style="color:${C.gold};font-weight:700;width:14px;flex-shrink:0;">3.</span><span><strong style="color:${C.tP};">Notion</strong> &mdash; notion.com. Free, browser-based.</span></div></div><p style="font-size:10px;line-height:1.5;color:${C.tM};margin-top:10px;font-style:italic;">No installs required. Bring your own laptop if you can.</p>`, 'background:rgba(255,255,255,0.015);')}
${d}
<div style="padding:14px 20px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,0.3);border-top:1px solid rgba(255,255,255,0.04);"><p style="font-size:9px;text-transform:uppercase;letter-spacing:0.1em;font-weight:600;color:${C.tM};">Bring this card on the day</p><p style="font-size:9px;color:${C.tM};display:flex;align-items:center;gap:5px;"><span style="color:${C.tM};display:inline-flex;">${ICON_DATE}</span>${WORKSHOP_DATE_SHORT}</p></div>`;

            app.innerHTML = `<div class="w-full max-w-md fade-up pb-12"><div id="result-card-render" style="background:linear-gradient(170deg,#13131f 0%,#181825 40%,#1a1a2e 100%);border-radius:20px;overflow:hidden;border:2px solid rgba(255,255,255,0.06);box-shadow:0 20px 60px rgba(0,0,0,0.5);font-family:'Plus Jakarta Sans',sans-serif;color:${C.tP};">${card}</div><div class="mt-8 space-y-3"><button id="downloadBtn" class="btn-primary w-full text-base">Download Card \u2B07</button><p class="text-xs text-center" style="color:var(--text-muted);">Save this card. Bring it along on the day.</p></div></div>`;
            document.getElementById('downloadBtn').addEventListener('click', downloadCard);
        }

        // ============================================================
        //  DOWNLOAD
        // ============================================================
        function downloadCard() {
            const card = document.getElementById('result-card-render');
            const btn = document.getElementById('downloadBtn');
            btn.textContent = 'Generating\u2026'; btn.disabled = true;

            html2canvas(card, { backgroundColor:'#13131f', scale:2, useCORS:true, logging:false, allowTaint:true, width:card.offsetWidth, height:card.offsetHeight, scrollX:0, scrollY:-window.scrollY }).then(canvas => {
                const url = canvas.toDataURL('image/png');
                const safe = participantName.replace(/[^a-zA-Z0-9]/g,'-');
                if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
                    const w = window.open('');
                    if (w) { w.document.write('<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Your Card</title><style>body{margin:0;padding:16px;background:#0f1019;display:flex;flex-direction:column;align-items:center;font-family:sans-serif;}img{max-width:100%;height:auto;border-radius:12px;}p{color:#9ca3af;font-size:14px;margin-top:16px;text-align:center;}</style></head><body><p>Long-press the image to save it.</p><img src="'+url+'" alt="Card"></body></html>'); w.document.close(); }
                    else { dl(url, safe); }
                } else { dl(url, safe); }
                btn.textContent = 'Download Card \u2B07'; btn.disabled = false;
                showToast('Card generated!');
            }).catch(e => { console.error(e); btn.textContent = 'Failed \u2014 Try Again'; btn.disabled = false; });
        }

        function dl(url, name) {
            const a = document.createElement('a');
            a.download = 'AI-Confident-' + name + '.png';
            a.href = url;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }

        // ============================================================
        //  ENTRY — resume mid-survey if a saved state exists
        // ============================================================
        function init() {
            const saved = loadState();
            if (saved && saved.name && Array.isArray(saved.answers)
                && saved.answers.length > 0
                && typeof saved.currentQ === 'number'
                && saved.currentQ < QUESTIONS.length) {
                participantName = saved.name;
                participantSchool = saved.school || '';
                answers = saved.answers;
                currentQ = Math.min(saved.currentQ, QUESTIONS.length - 1);
                renderQuestion();
            } else {
                renderWelcome();
            }
        }
        init();
    })();
    </script>
</body>
</html>
