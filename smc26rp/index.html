<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTY 2026 Review &amp; Planning: Pre-Session Reflection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        :root {
            --bg-deep:    #07091e;
            --bg-card:    #0d1138;
            --bg-surface: #131848;
            --accent:     #FFE200;
            --accent-dim: #D4A843;
            --accent-lt:  #FFF176;
            --text-p:     #e8e6e3;
            --text-s:     #9ca3af;
            --text-m:     #6b7280;
            --bty-navy:   #000C53;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            min-height: 100vh; min-height: 100dvh;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-p);
        }

        body {
            background-image:
                radial-gradient(ellipse at 18% 0%,   rgba(255,226,0,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 82% 100%,  rgba(0,12,83,0.35)  0%, transparent 55%);
        }

        .font-serif { font-family: 'DM Serif Display', serif; }

        .fade-up {
            animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) forwards;
            opacity: 0; transform: translateY(16px);
        }
        @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }

        .stagger-1 { animation-delay: 0.06s; }
        .stagger-2 { animation-delay: 0.12s; }
        .stagger-3 { animation-delay: 0.18s; }
        .stagger-4 { animation-delay: 0.24s; }
        .stagger-5 { animation-delay: 0.30s; }
        .stagger-6 { animation-delay: 0.36s; }

        /* ── Dual/triple-choice option buttons ── */
        .option-btn {
            background: var(--bg-surface);
            border: 1.5px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 16px 20px 16px 50px;
            text-align: left; cursor: pointer;
            transition: all 0.25s cubic-bezier(0.22,1,0.36,1);
            color: var(--text-p);
            font-size: 0.92rem; line-height: 1.55;
            position: relative; width: 100%;
        }
        .option-btn:hover {
            border-color: rgba(255,255,255,0.15);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
        }
        .option-badge {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            width: 26px; height: 26px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 800;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.03);
            color: rgba(255,255,255,0.15);
            transition: all 0.25s;
        }
        .option-btn.pick-1 { border-color: var(--accent); background: rgba(255,226,0,0.07); }
        .option-btn.pick-1 .option-badge { background: var(--accent); border-color: var(--accent); color: #080919; }
        .option-btn.pick-2 { border-color: #60a5fa; background: rgba(96,165,250,0.06); }
        .option-btn.pick-2 .option-badge { background: #60a5fa; border-color: #60a5fa; color: #080919; }
        .option-btn.pick-3 { border-color: #34d399; background: rgba(52,211,153,0.06); }
        .option-btn.pick-3 .option-badge { background: #34d399; border-color: #34d399; color: #080919; }

        /* ── Single-choice select buttons ── */
        .sel-btn {
            background: var(--bg-surface);
            border: 1.5px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 13px 16px; text-align: left; cursor: pointer;
            transition: all 0.25s cubic-bezier(0.22,1,0.36,1);
            color: var(--text-p); font-size: 0.92rem; line-height: 1.5; width: 100%;
        }
        .sel-btn:hover { border-color: rgba(255,255,255,0.15); transform: translateY(-1px); }
        .sel-btn.active { border-color: var(--accent); background: rgba(255,226,0,0.07); }

        /* ── Progress ── */
        .progress-track { width: 100%; height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-lt));
            border-radius: 2px;
            transition: width 0.5s cubic-bezier(0.22,1,0.36,1);
        }

        /* ── Primary button ── */
        .btn-primary {
            background: var(--accent); color: #080919;
            font-weight: 700; padding: 14px 32px;
            border-radius: 10px; border: none; cursor: pointer;
            font-size: 1rem; letter-spacing: 0.02em;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(255,226,0,0.2);
        }
        .btn-primary:hover { background: var(--accent-lt); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,226,0,0.3); }
        .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }

        /* ── Back button ── */
        .btn-back {
            background: transparent; color: var(--text-s);
            font-weight: 600; padding: 14px 20px;
            border-radius: 10px; border: 1.5px solid rgba(255,255,255,0.08);
            cursor: pointer; font-size: 0.9rem;
            transition: all 0.2s; white-space: nowrap;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .btn-back:hover { border-color: rgba(255,255,255,0.2); color: var(--text-p); }

        /* ── Textarea ── */
        .reflect-ta {
            width: 100%; min-height: 115px;
            background: var(--bg-surface);
            border: 1.5px solid rgba(255,255,255,0.08);
            border-radius: 12px; padding: 14px 16px;
            color: var(--text-p);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.93rem; line-height: 1.6;
            resize: vertical; outline: none; transition: border-color 0.2s;
        }
        .reflect-ta:focus { border-color: var(--accent); }
        .reflect-ta::placeholder { color: var(--text-m); }

        /* ── Inline text input (other) ── */
        .other-input {
            width: 100%; background: var(--bg-surface);
            border: 1.5px solid rgba(255,255,255,0.08);
            border-radius: 10px; padding: 10px 14px;
            color: var(--text-p); font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.88rem; outline: none;
            transition: border-color 0.2s; margin-top: 8px;
        }
        .other-input:focus { border-color: var(--accent); }

        /* ── Name input ── */
        .name-input {
            width: 100%; padding: 15px 20px;
            border-radius: 12px; text-align: center;
            font-size: 1.1rem; font-weight: 600;
            outline: none; transition: border-color 0.2s;
            background: var(--bg-surface);
            border: 1.5px solid rgba(255,255,255,0.08);
            color: var(--text-p);
        }
        .name-input:focus { border-color: var(--accent); }

        /* ── Processing dots ── */
        .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); animation: pulse 1.4s ease-in-out infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse { 0%,80%,100% { transform: scale(0.6); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; } }

        /* ── Toast ── */
        .toast {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-card); border: 1px solid rgba(255,226,0,0.25);
            color: var(--text-p); padding: 12px 24px;
            border-radius: 10px; font-size: 0.85rem; z-index: 100;
            transition: transform 0.4s cubic-bezier(0.22,1,0.36,1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        @media (max-width: 640px) {
            .option-btn { padding: 14px 16px 14px 46px; font-size: 0.86rem; }
            .sel-btn    { font-size: 0.86rem; }
        }
    </style>
</head>

    // ================================================================

    function renderQ1() {
        app.innerHTML = `

                    <span class="text-xs font-semibold tracking-widest uppercase" style="color:var(--text-m);">Question 1 of 6</span>

                </div>

            <div class="mb-5 p-4 rounded-xl" style="background:rgba(255,226,0,0.03);border:1px solid rgba(255,226,0,0.07);">

            <h2 class="text-xl font-bold mb-5 leading-snug font-serif" style="color:var(--text-p);">Think about your moments of success. What did that feel like? And what did it mean to you and those around you?</h2>

                <span class="text-xs" style="color:var(--text-m);">Minimum 10 characters</span>
            </div>
            <div class="flex gap-3">

        const ta  = document.getElementById('q1ta');

    // ================================================================
    //  SCORING
    //  Q2: 1st x1.0, 2nd x0.6, 3rd x0.3
    //  Q4: 1st x1.0, 2nd x0.5
    //  Q5: no scoring (data-for-you)
    // ================================================================
    function calculateResults() {
        const totals = [0, 0, 0, 0]; // [Arch, Cult, Expl, Weav]

        if (q2Picks.first  !== null) Q2_OPTIONS[q2Picks.first ].scores.forEach((s, i) => totals[i] += s);
        if (q2Picks.second !== null) Q2_OPTIONS[q2Picks.second].scores.forEach((s, i) => totals[i] += s * 0.6);
        if (q2Picks.third  !== null) Q2_OPTIONS[q2Picks.third ].scores.forEach((s, i) => totals[i] += s * 0.3);
        if (q3Picks.first  !== null) Q3_OPTIONS[q3Picks.first ].scores.forEach((s, i) => totals[i] += s);
        if (q3Picks.second !== null) Q3_OPTIONS[q3Picks.second].scores.forEach((s, i) => totals[i] += s * 0.5);
        if (q4Picks.first  !== null) Q4_OPTIONS[q4Picks.first ].scores.forEach((s, i) => totals[i] += s);
        if (q4Picks.second !== null) Q4_OPTIONS[q4Picks.second].scores.forEach((s, i) => totals[i] += s * 0.5);

        const sorted    = PERSONA_KEYS.map((k, i) => ({ key: k, score: totals[i] })).sort((a, b) => b.score - a.score);
        const primary   = sorted[0];
        const secondary = (sorted[1].score >= primary.score * 0.7 && sorted[1].score > 0) ? sorted[1] : null;

        const growthFirst  = q3Picks.first  !== null
            ? (q3Picks.first  === Q3_OTHER_IDX ? q3OtherText : Q3_OPTIONS[q3Picks.first ].label)
            : 'Not specified';
        const growthSecond = q3Picks.second !== null
            ? (q3Picks.second === Q3_OTHER_IDX ? q3OtherText : Q3_OPTIONS[q3Picks.second].label)
            : null;
        const growthFocus = growthSecond ? `${growthFirst} · ${growthSecond}` : growthFirst;

        const q5IsOther       = q5Answer === Q5_OTHER_IDX;
        const collectiveFocus = q5IsOther ? q5OtherText : (q5Answer !== null ? Q5_OPTIONS[q5Answer].label : 'Not specified');

        const q6IsOther      = q6Answer === Q6_OTHER_IDX;
        const emotionalState = q6IsOther ? q6OtherText : (q6Answer !== null ? Q6_OPTIONS[q6Answer].label : 'Not specified');

        const q1Truncated = q1Text.length > 130 ? q1Text.slice(0, 130) + '…' : q1Text;

        return { totals, sorted, primary, secondary, growthFocus, collectiveFocus, emotionalState, q1Truncated };
    }

    // ================================================================
    //  GOOGLE SHEETS
    // ================================================================
    function sendToSheets(r) {
        const q2label = (idx) => {
            if (idx === null) return 'Not specified';
            if (idx === Q2_OTHER_IDX) return 'Others: ' + q2OtherText;
            return Q2_OPTIONS[idx].text;
        };
        const q3label = (idx) => {
            if (idx === null) return 'Not specified';
            if (idx === Q3_OTHER_IDX) return 'Others: ' + q3OtherText;
            return Q3_OPTIONS[idx].label;
        };
        const q4label = (idx) => {
            if (idx === null) return 'Not specified';
            if (idx === Q4_OTHER_IDX) return 'Others: ' + q4OtherText;
            return Q4_OPTIONS[idx].text;
        };

        const payload = {
            timestamp:          new Date().toISOString(),
            name:               participantName,
            orientation:        PERSONAS[r.primary.key].name,
            secondaryOrientation: r.secondary ? PERSONAS[r.secondary.key].name : 'None',
            growthFocus:        r.growthFocus,
            collectiveFocus:    r.collectiveFocus,
            emotionalState:     r.emotionalState,
            q1:                 q1Text,
            q2first:            q2label(q2Picks.first),
            q2second:           q2label(q2Picks.second),
            q2third:            q2label(q2Picks.third),
            q3first:            q3label(q3Picks.first),
            q3second:           q3label(q3Picks.second),
            q4first:            q4label(q4Picks.first),
            q4second:           q4label(q4Picks.second),
            scoreBreakdown:     r.sorted.map(s => PERSONAS[s.key].name + ':' + s.score.toFixed(1)).join(', ')
        };
        fetch(SHEETS_URL, {
            method: 'POST', mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).catch(e => console.warn('[Sheets]', e));
    }

    // ================================================================
    //  RESULT CARD  —  all inline styles for html2canvas compatibility
    // ================================================================
    function renderResults(r) {
        const pri = PERSONAS[r.primary.key];
        const sec = r.secondary ? PERSONAS[r.secondary.key] : null;

        const C = {
            navy:  '#000C53', yellow: '#FFE200', yDim: '#D4A843',
            tP:    '#e8e6e3', tS:     '#9ca3af', tM:   '#6b7280',
            div:   'rgba(255,255,255,0.06)',
            bg:    'linear-gradient(170deg,#08081f 0%,#0d1138 45%,#111540 100%)'
        };

        const mx = Math.max(...r.sorted.map(s => s.score), 1);
        const bars = r.sorted.map(s => {
            const p   = PERSONAS[s.key];
            const pct = Math.round((s.score / mx) * 100);
            return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
                <span style="font-size:10px;font-weight:700;width:80px;text-align:right;color:${p.color};white-space:nowrap;">${p.name}</span>
                <div style="flex:1;height:7px;border-radius:9999px;background:rgba(255,255,255,0.06);">
                    <div style="height:100%;border-radius:9999px;width:${pct}%;background:${p.color};${s.score > 0 ? 'min-width:4px;' : ''}"></div>
                </div>
                <span style="font-size:9px;color:${C.tM};width:28px;">${s.score.toFixed(1)}</span>
            </div>`;
        }).join('');

        const secHTML = sec ? `
            <div style="display:flex;align-items:center;gap:8px;margin-top:10px;padding:9px 12px;border-radius:8px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);">
                <span style="font-size:14px;color:${sec.color};">${sec.icon}</span>
                <div>
                    <p style="font-size:9px;text-transform:uppercase;letter-spacing:0.05em;font-weight:600;color:${C.tM};">Secondary orientation</p>
                    <p style="font-size:12px;font-weight:700;margin-top:1px;color:${sec.color};">${sec.name}, <span style="font-style:italic;font-weight:400;">${sec.tagline}</span></p>
                </div>
            </div>` : '';

        const d = `<div style="height:1px;background:${C.div};margin:0 20px;"></div>`;
        const S = (content, extra = '') => `<div style="padding:16px 20px;${extra}">${content}</div>`;

        const card = `
<div style="height:5px;background:linear-gradient(90deg,${C.navy},${C.yellow});"></div>

${S(`
    <div style="display:flex;align-items:flex-start;justify-content:space-between;">
        <div>
            <p style="font-size:10px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:${C.yDim};">Beatty Secondary School</p>
            <p style="font-size:9px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;margin-top:2px;color:${C.tM};">2026 Review &amp; Planning &middot; Pre-Session Reflection</p>
        </div>
        <span style="font-size:9px;font-weight:600;padding:4px 8px;border-radius:4px;background:rgba(255,226,0,0.08);color:${C.yellow};margin-top:2px;">May 2026</span>
    </div>
`, 'padding-bottom:8px;')}

${d}

${S(`
    <p style="font-size:16px;font-weight:700;margin-bottom:6px;color:${C.tP};">Hi, ${participantName}!</p>
    <p style="font-size:11px;line-height:1.65;color:${C.tS};font-style:italic;">&ldquo;${r.q1Truncated}&rdquo;</p>
`)}

${d}

${S(`
    <p style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px;color:${C.tM};">Your professional orientation</p>
    <div style="border-radius:12px;padding:16px;background:${pri.colorLight};border:1px solid ${pri.color}33;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
            <span style="font-size:22px;color:${pri.color};">${pri.icon}</span>
            <div>
                <p style="font-size:21px;font-weight:700;color:${pri.color};font-family:'DM Serif Display',serif;">${pri.name}</p>
                <p style="font-size:11px;color:${C.tS};font-style:italic;">${pri.tagline}</p>
            </div>
        </div>
        <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;">
            <span style="font-size:9px;font-weight:600;padding:3px 7px;border-radius:4px;background:rgba(255,255,255,0.06);color:${C.tS};border:1px solid rgba(255,255,255,0.1);">${pri.ideology}</span>
            <span style="font-size:9px;font-weight:600;padding:3px 7px;border-radius:4px;background:rgba(255,255,255,0.06);color:${C.tS};border:1px solid rgba(255,255,255,0.1);">${pri.st}</span>
        </div>
        <p style="font-size:11px;line-height:1.65;color:${C.tS};">${pri.description}</p>
    </div>
    ${secHTML}
`)}

${d}

${S(`
    <p style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:12px;color:${C.tM};">Orientation profile</p>
    ${bars}
`)}

${d}

${S(`
    <p style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px;color:${C.tM};">Reflections to carry</p>
    <div style="border-radius:10px;padding:12px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);margin-bottom:8px;">
        <p style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:${C.tM};margin-bottom:4px;">One thing, together</p>
        <p style="font-size:12px;font-weight:600;color:${C.tP};">${r.collectiveFocus}</p>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <div style="border-radius:10px;padding:12px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);">
            <p style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:${C.tM};margin-bottom:4px;">Area of growth</p>
            <p style="font-size:12px;font-weight:600;color:${C.tP};">${r.growthFocus}</p>
        </div>
        <div style="border-radius:10px;padding:12px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);">
            <p style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:${C.tM};margin-bottom:4px;">Arriving as</p>
            <p style="font-size:12px;font-weight:600;color:${C.tP};">${r.emotionalState}</p>
        </div>
    </div>
`)}

${d}

${S(`
    <p style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:5px;color:${C.yDim};">Your invitation for 2026&#8211;27</p>
    <p style="font-size:11px;line-height:1.7;font-style:italic;color:${C.tS};font-family:'DM Serif Display',serif;">${pri.invitation}</p>
`)}

${d}

<div style="padding:11px 20px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,0.4);border-top:1px solid rgba(255,255,255,0.04);">
    <p style="font-size:8px;text-transform:uppercase;letter-spacing:0.12em;font-weight:600;color:${C.tM};">Non Vi Sed Arte</p>
    <p style="font-size:8px;color:${C.tM};">Beatty Secondary School</p>
</div>`;

        app.innerHTML = `
        <div class="w-full max-w-md fade-up pb-12">
            <div id="result-card-render" style="background:${C.bg};border-radius:20px;overflow:hidden;border:2px solid rgba(255,255,255,0.06);box-shadow:0 20px 60px rgba(0,0,0,0.55);font-family:'Plus Jakarta Sans',sans-serif;color:${C.tP};">
                ${card}
            </div>
            <div class="mt-8 space-y-3">
                <button id="downloadBtn" class="btn-primary w-full text-base">Download Card &#x2B07;</button>
                <p class="text-xs text-center" style="color:var(--text-m);">Save this card. Bring it along to Friday&#8217;s session.</p>
            </div>
        </div>`;

        document.getElementById('downloadBtn').addEventListener('click', downloadCard);
    }

    // ================================================================
    //  DOWNLOAD
    // ================================================================
    function downloadCard() {
        const card = document.getElementById('result-card-render');
        const btn  = document.getElementById('downloadBtn');
        btn.textContent = 'Generating…'; btn.disabled = true;

        html2canvas(card, {
            backgroundColor: '#08081f', scale: 2, useCORS: true,
            logging: false, allowTaint: true,
            width: card.offsetWidth, height: card.offsetHeight,
            scrollX: 0, scrollY: -window.scrollY
        }).then(canvas => {
            const url  = canvas.toDataURL('image/png');
            const safe = participantName.replace(/[^a-zA-Z0-9]/g, '-');
            if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
                const w = window.open('');
                if (w) {
                    w.document.write('<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Your Card</title><style>body{margin:0;padding:16px;background:#07091e;display:flex;flex-direction:column;align-items:center;font-family:sans-serif;}img{max-width:100%;height:auto;border-radius:12px;}p{color:#9ca3af;font-size:14px;margin-top:16px;text-align:center;}</style></head><body><p>Long-press the image to save it.</p><img src="' + url + '" alt="Card"></body></html>');
                    w.document.close();
                } else { dlFile(url, safe); }
            } else { dlFile(url, safe); }
            btn.textContent = 'Download Card ⬇'; btn.disabled = false;
            showToast('Card ready. Bring it to Friday!');
        }).catch(e => {
            console.error(e);
            btn.textContent = 'Failed. Try Again'; btn.disabled = false;
        });
    }

    function dlFile(url, name) {
        const a = document.createElement('a');
        a.download = 'BTY-2026-' + name + '.png';
        a.href = url;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }

    // ================================================================
    renderWelcome();
})();
</script>
